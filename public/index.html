<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1612">
<title>世界遺産マップクイズ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#1a1612;--bg2:#2d261f;--fg:#e8dcc8;--fg2:#a89880;--fg3:#6b6256;--gold:#c49a5c;--gold2:#a67c3d;--red:#ef4444;--green:#10b981;--blue:#3b82f6;--purple:#8b5cf6;--radius:12px}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif}
#app{height:100%;display:flex;flex-direction:column}
.start{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:24px;text-align:center;background:linear-gradient(145deg,#1a1612,#2d261f,#1a1612);overflow-y:auto}
.start h1{font-size:26px;font-weight:500;letter-spacing:4px;margin:8px 0}
.start .sub{color:var(--fg2);font-size:13px;line-height:1.8;margin-bottom:20px}
.mode-cards{display:flex;gap:12px;margin-bottom:16px;width:100%;max-width:400px}
.mode-card{flex:1;padding:16px 12px;border-radius:var(--radius);border:1px solid rgba(232,220,200,.1);background:rgba(232,220,200,.03);cursor:pointer;transition:all .2s;text-align:center}
.mode-card.active{border-color:var(--gold);background:rgba(196,154,92,.1)}
.mode-card h3{font-size:14px;font-weight:500;margin-bottom:4px}
.mode-card p{font-size:11px;color:var(--fg3);line-height:1.5}
.size-row{display:flex;gap:8px;margin-bottom:14px}
.size-btn{width:48px;height:48px;border-radius:10px;border:1px solid rgba(232,220,200,.12);background:transparent;color:var(--fg3);font-size:17px;cursor:pointer;font-family:inherit;transition:all .2s}
.size-btn.active{border-color:var(--gold);background:rgba(196,154,92,.12);color:var(--fg)}
.region-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center;max-width:420px}
.region-btn{padding:6px 12px;font-size:11px;font-family:inherit;border-radius:20px;border:1px solid rgba(232,220,200,.12);background:transparent;color:var(--fg3);cursor:pointer;transition:all .2s;white-space:nowrap}
.region-btn.active{border-color:var(--gold);background:rgba(196,154,92,.12);color:var(--fg)}
.score-rules{background:rgba(232,220,200,.04);border-radius:10px;padding:14px 20px;margin-bottom:18px;text-align:left;font-size:12px;color:var(--fg2);line-height:1.9;max-width:400px;width:100%}
.start-btn{padding:14px 56px;font-size:16px;font-family:inherit;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:10px;cursor:pointer;font-weight:600;letter-spacing:2px;box-shadow:0 4px 20px rgba(196,154,92,.3);transition:transform .15s}
.start-btn:active{transform:scale(.97)}
.site-count{color:var(--fg3);font-size:12px;margin-bottom:10px}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid rgba(232,220,200,.08);flex-shrink:0;background:var(--bg)}
.header .progress-dots{display:flex;gap:3px}
.header .dot{width:7px;height:7px;border-radius:50%;background:rgba(232,220,200,.12);transition:background .3s}
.header .dot.correct{background:var(--green)}
.header .dot.wrong{background:var(--red)}
.header .dot.current{background:var(--gold);box-shadow:0 0 6px rgba(196,154,92,.5)}
.header .score-display{color:var(--gold);font-size:13px;font-weight:600}
.header .q-count{color:var(--fg3);font-size:12px}
.question{padding:12px 16px 8px;text-align:center;flex-shrink:0;background:var(--bg)}
.question .label{color:var(--fg3);font-size:10px;letter-spacing:2px;margin-bottom:4px}
.question h2{font-size:19px;font-weight:500;margin-bottom:2px}
.question .name-en{color:var(--fg2);font-size:11px}
.question .hint-tags{display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.map-wrap{flex:1;margin:0 10px 0;border-radius:var(--radius);overflow:hidden;border:1px solid rgba(232,220,200,.1);position:relative;min-height:0}
#map{width:100%;height:100%;background:#2d261f;will-change:transform}
.leaflet-container{background:#2d261f !important}
.result-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(26,22,18,.95);backdrop-filter:blur(10px);padding:16px;border-top:1px solid rgba(232,220,200,.1);z-index:1000;max-height:55%;overflow-y:auto;animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.result-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.result-score{display:flex;align-items:center;gap:8px}
.result-score .emoji{font-size:22px}
.result-score .pts{font-size:26px;font-weight:700}
.result-meta{color:var(--fg3);font-size:12px;line-height:1.7}
.result-desc{color:var(--fg2);font-size:12px;line-height:1.8;margin-top:8px;padding:10px 12px;background:rgba(232,220,200,.04);border-radius:8px;border-left:3px solid var(--gold)}
.next-btn{padding:10px 28px;font-size:14px;font-family:inherit;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:8px;cursor:pointer;font-weight:600;flex-shrink:0;white-space:nowrap}
.sr-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;margin-top:4px}
.sr-new{background:rgba(59,130,246,.15);color:var(--blue)}
.sr-review{background:rgba(196,154,92,.15);color:var(--gold)}
.action-bar{padding:12px 16px;text-align:center;flex-shrink:0;background:var(--bg)}
.confirm-btn{padding:12px 48px;font-size:15px;font-family:inherit;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:10px;cursor:pointer;font-weight:600;letter-spacing:1px;box-shadow:0 4px 16px rgba(196,154,92,.3)}
.confirm-btn:active{transform:scale(.97)}
.tap-hint{color:var(--fg3);font-size:13px}
.summary{height:100%;overflow-y:auto;padding:20px 16px;background:linear-gradient(145deg,#1a1612,#2d261f,#1a1612)}
.summary-header{text-align:center;margin-bottom:24px}
.summary-header .emoji{font-size:44px}
.summary-header h2{font-size:20px;font-weight:400;letter-spacing:3px;margin:4px 0}
.summary-stats{display:flex;justify-content:center;gap:32px;margin-top:14px}
.summary-stat .val{font-size:32px;font-weight:700}
.summary-stat .lbl{font-size:11px;color:var(--fg3)}
.summary-list{background:rgba(232,220,200,.04);border-radius:var(--radius);border:1px solid rgba(232,220,200,.08);overflow:hidden;margin-bottom:20px}
.summary-list-header{padding:10px 14px;border-bottom:1px solid rgba(232,220,200,.06);font-size:12px;color:var(--fg2)}
.summary-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(232,220,200,.04)}
.summary-item:last-child{border-bottom:none}
.summary-item .sc{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.summary-item .info{flex:1;min-width:0}
.summary-item .info .nm{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.summary-item .info .det{font-size:11px;color:var(--fg3)}
.retry-btn{display:block;margin:0 auto;padding:12px 48px;font-size:15px;font-family:inherit;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:10px;cursor:pointer;font-weight:600;letter-spacing:2px}
.data-btn{padding:8px 16px;font-size:12px;font-family:inherit;background:rgba(232,220,200,.06);color:var(--fg2);border:1px solid rgba(232,220,200,.12);border-radius:8px;cursor:pointer;transition:all .2s}
.data-btn:active{transform:scale(.95)}
</style>
</head>

{"id": 759, "name": "テイデ国立公園", "nameEn": "Teide National Park", "country": "スペイン", "lat": 28.2713888889, "lng": -16.6436111111, "era": "自然遺産", "criteria": "(vii)(viii)", "desc": "テネリフェ島にあるスペイン最高峰テイデ山（標高3718m）を擁する火山景観。海底からの比高は約7500mで世界第3位の火山構造を誇る。", "region": "Europe and North America"},
{"id": 760, "name": "サンティアゴ・デ・コンポステーラ（旧市街）", "nameEn": "Santiago de Compostela (Old Town)", "country": "スペイン", "lat": 42.88076, "lng": -8.54468, "era": "中世", "criteria": "(i)(ii)", "desc": "聖ヤコブの墓所として中世ヨーロッパ三大巡礼地の一つ。大聖堂の栄光の門（ポルティコ・デ・ラ・グロリア）をはじめロマネスクからバロックまでの建築が集まる。", "region": "Europe and North America"},
{"id": 761, "name": "ビスカヤ橋", "nameEn": "Vizcaya Bridge", "country": "スペイン", "lat": 43.323175, "lng": -3.0168333333, "era": "近現代", "criteria": "(i)(ii)", "desc": "1893年完成の世界初の運搬橋。ビルバオ近郊に架かり、高さ45m・スパン160mの鉄鋼構造でゴンドラにより人や車両を輸送する産業革命期の傑作。", "region": "Europe and North America"},
{"id": 762, "name": "ヘラクレスの塔", "nameEn": "Tower of Hercules", "country": "スペイン", "lat": 43.3858333333, "lng": -8.4063888889, "era": "古代", "criteria": "(iii)", "desc": "1世紀にローマ人が建設した現役最古の灯台。ラ・コルーニャ港に立ち、高さ55mのうち34mがローマ時代の石造で、18世紀に改修された。", "region": "Europe and North America"},
{"id": 763, "name": "アントニ・ガウディの作品群", "nameEn": "Works of Antoni Gaudí", "country": "スペイン", "lat": 41.41338, "lng": 2.152972, "era": "近現代", "criteria": "(i)(ii)(iv)", "desc": "バルセロナを中心にガウディ（1852〜1926年）が手がけた7作品。サグラダ・ファミリアやグエル公園など独創的な建築・装飾が近代建築史に革新をもたらした。", "region": "Europe and North America"},
{"id": 764, "name": "古代都市シーギリヤ", "nameEn": "Ancient City of Sigiriya", "country": "スリランカ", "lat": 7.95, "lng": 80.75, "era": "古代", "criteria": "(ii)(iii)(iv)", "desc": "5世紀にカッサパ1世が高さ約180mの岩山「ライオンロック」の頂上に築いた王宮跡。岩壁に描かれたシーギリヤ・レディの壁画でも知られる。", "region": "Asia and the Pacific"},
{"id": 765, "name": "聖地アヌラーダプラ", "nameEn": "Sacred City of Anuradhapura", "country": "スリランカ", "lat": 8.333333333, "lng": 80.38333333, "era": "古代", "criteria": "(ii)(iii)", "desc": "紀元前3世紀に菩提樹の分木が植えられたスリランカ最古の仏教聖地。約1300年間にわたり政治・宗教の中心として栄え、宮殿や僧院が残る。", "region": "Asia and the Pacific"},
{"id": 766, "name": "イエス生誕の地：ベツレヘムの聖誕教会と巡礼路", "nameEn": "Birthplace of Jesus: Church of the Nativity and the Pilgrimage Route, Bethlehem", "country": "パレスチナ", "lat": 31.7043527778, "lng": 35.2075, "era": "古代", "criteria": "(iv)", "desc": "エルサレム南方約10kmに位置するイエス・キリスト誕生の地とされる聖地。339年に最初の教会が建てられ、6世紀再建の聖堂には初期のモザイクが残る。", "region": "Arab States"},
{"id": 767, "name": "聖地キャンディ", "nameEn": "Sacred City of Kandy", "country": "スリランカ", "lat": 7.293611111, "lng": 80.64027778, "era": "中世〜近世", "criteria": "(iv)", "desc": "シンハラ王朝最後の都で、仏歯を祀る仏歯寺（ダラダー・マーリガーワ寺院）がある聖地。1815年の英国統治まで2500年以上の仏教文化を支えた。", "region": "Asia and the Pacific"},
{"id": 768, "name": "聖ヒラリオン修道院／テル・ウンム・アメル", "nameEn": "Saint Hilarion Monastery/ Tell Umm Amer", "country": "パレスチナ", "lat": 31.4473055556, "lng": 34.3663611111, "era": "古代", "criteria": "(ii)(iii)", "desc": "4世紀に聖ヒラリオンが創設した中東最古級の修道院遺跡。聖地における最初の修道共同体であり、アジアとアフリカを結ぶ交易路上の要衝に位置する。", "region": "Arab States"},
{"id": 769, "name": "サンガネブ海洋国立公園とドゥンゴナブ湾＝ムッカワル島海洋国立公園", "nameEn": "Sanganeb Marine National Park and Dungonab Bay – Mukkawar Island Marine National Park", "country": "スーダン", "lat": 19.7361111111, "lng": 37.4430555556, "era": "自然遺産", "criteria": "(vii)(ix)(x)", "desc": "紅海に位置するスーダン唯一の環礁サンガネブと、ジュゴンの重要生息地ドゥンゴナブ湾からなる海洋保護区。サンゴ礁やマングローブが多様な生態系を育む。", "region": "Arab States"},
{"id": 770, "name": "メロエ島の考古遺跡群", "nameEn": "Archaeological Sites of the Island of Meroe", "country": "スーダン", "lat": 16.9333333333, "lng": 33.7166666667, "era": "古代", "criteria": "(ii)(iii)(iv)(v)", "desc": "紀元前8世紀〜紀元後4世紀に栄えたクシュ王国の中心地。ナイル川沿いにピラミッドや神殿が残り、エジプトとアフリカ内陸部を結ぶ文化交流を示す。", "region": "Arab States"},
{"id": 771, "name": "ビルカとホーヴゴーデン", "nameEn": "Birka and Hovgården", "country": "スウェーデン", "lat": 59.33514, "lng": 17.54264, "era": "中世", "criteria": "(iii)(iv)", "desc": "メーラレン湖の島々に位置する9〜10世紀のヴァイキング時代の交易拠点。831年に聖アンスガルがスウェーデン初のキリスト教会を設立した地でもある。", "region": "Europe and North America"},
{"id": 772, "name": "南エーランドの農業景観", "nameEn": "Agricultural Landscape of Southern Öland", "country": "スウェーデン", "lat": 56.325, "lng": 16.48333, "era": "先史", "criteria": "(iv)(v)", "desc": "バルト海のエーランド島南部に広がる石灰岩台地の農業景観。約5000年にわたる人間の居住と土地利用の連続性を示す文化的景観である。", "region": "Europe and North America"},
{"id": 773, "name": "スコーグスシュルコゴーデン（森の墓地）", "nameEn": "Skogskyrkogården", "country": "スウェーデン", "lat": 59.27556, "lng": 18.09944, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1917〜1920年にアスプルンドとレヴェレンツが設計したストックホルムの墓地。松林と建築が融合した景観設計は世界の墓地建築に大きな影響を与えた。", "region": "Europe and North America"},
{"id": 774, "name": "ベルン旧市街", "nameEn": "Old City of Berne", "country": "スイス", "lat": 46.94806, "lng": 7.45028, "era": "中世", "criteria": "(iii)", "desc": "12世紀にアーレ川に囲まれた丘に建設されたスイスの首都。15世紀のアーケードや16世紀の噴水など中世の統一的な都市計画が今に残る。", "region": "Europe and North America"},
{"id": 775, "name": "古代都市アレッポ", "nameEn": "Ancient City of Aleppo", "country": "シリア", "lat": 36.1991666667, "lng": 37.1627777778, "era": "古代〜中世", "criteria": "(iii)(iv)", "desc": "紀元前2千年紀から交易の十字路として栄えた都市。13世紀の城塞や12世紀の大モスクなど多文明の遺構が残るが、紛争により危機遺産に登録されている。", "region": "Arab States"},
{"id": 776, "name": "古代クッタルの文化遺産群", "nameEn": "Cultural Heritage Sites of Ancient Khuttal", "country": "タジキスタン", "lat": 37.7443936111, "lng": 69.2987127778, "era": "中世", "criteria": "(ii)(iii)", "desc": "7〜16世紀にシルクロード交易で栄えた中世王国クッタルの遺跡群。仏教寺院・宮殿・隊商宿など10遺跡が周辺帝国との文化交流を物語る。", "region": "Asia and the Pacific"},
{"id": 777, "name": "カルタゴの考古遺跡", "nameEn": "Archaeological Site of Carthage", "country": "チュニジア", "lat": 36.85278, "lng": 10.32333, "era": "古代", "criteria": "(ii)(iii)", "desc": "紀元前9世紀にフェニキア人が建設した地中海の大交易都市。ポエニ戦争でローマに滅ぼされた紀元前146年以降、ローマ都市として再建された遺構が残る。", "region": "Arab States"},
{"id": 778, "name": "エル・ジェムの円形闘技場", "nameEn": "Amphitheatre of El Jem", "country": "チュニジア", "lat": 35.29639, "lng": 10.70694, "era": "古代", "criteria": "(iv)", "desc": "3世紀に建設された北アフリカ最大の円形闘技場で、約3万5000人を収容可能。ローマ帝国の壮大さと属州における繁栄を示す建造物である。", "region": "Arab States"},
{"id": 779, "name": "ジェルバ島：島嶼領域における居住様式の証", "nameEn": "Djerba: Testimony to a settlement pattern in an island territory", "country": "チュニジア", "lat": 33.7924194444, "lng": 11.0039583333, "era": "中世", "criteria": "(v)", "desc": "9世紀頃から乾燥環境に適応して発展したジェルバ島の低密度分散型居住パターン。自給自足の集落が道路網で結ばれた独特の島嶼定住の証である。", "region": "Arab States"},
{"id": 780, "name": "ケルクアンのポエニ都市とネクロポリス", "nameEn": "Punic Town of Kerkuane and its Necropolis", "country": "チュニジア", "lat": 36.94639, "lng": 11.09917, "era": "古代", "criteria": "(iii)", "desc": "第一次ポエニ戦争（前250年頃）で放棄されたフェニキア＝ポエニ都市の唯一の遺例。ローマに再建されなかったため、当時の都市計画がそのまま残る。", "region": "Arab States"},
{"id": 781, "name": "チュニスのメディナ", "nameEn": "Medina of Tunis", "country": "チュニジア", "lat": 36.81667, "lng": 10.16667, "era": "中世", "criteria": "(ii)(iii)(v)", "desc": "12〜16世紀のムワッヒド朝・ハフス朝時代にイスラム世界有数の都市として繁栄。宮殿やモスクなど約700のモニュメントが旧市街に集中する。", "region": "Arab States"},
{"id": 782, "name": "ギョベクリ・テペ", "nameEn": "Göbekli Tepe", "country": "トルコ", "lat": 37.2232419444, "lng": 38.9223638889, "era": "先史", "criteria": "(i)(ii)(iv)", "desc": "紀元前9600〜8200年頃に狩猟採集民が建造した世界最古級の巨石神殿遺跡。T字型石柱に動物の浮彫が施され、農耕以前の宗教儀礼の存在を示す。", "region": "Europe and North America"},
{"id": 783, "name": "ディヴリーイの大モスクと病院", "nameEn": "Great Mosque and Hospital of Divriği", "country": "トルコ", "lat": 39.371271, "lng": 38.121826, "era": "中世", "criteria": "(i)(iv)", "desc": "1228〜29年にアフメト・シャーが建設したモスクと付属病院。3つの門に施された精緻な装飾彫刻は、イスラム建築における独創的な傑作とされる。", "region": "Europe and North America"},
{"id": 784, "name": "イスタンブールの歴史地区", "nameEn": "Historic Areas of Istanbul", "country": "トルコ", "lat": 41.00847, "lng": 28.97993, "era": "古代〜中世", "criteria": "(i)(ii)(iii)(iv)", "desc": "ボスポラス海峡に面し2000年以上の歴史を持つ都市。6世紀のアヤソフィアや16世紀のスレイマニエ・モスクなどビザンツ・オスマン両帝国の傑作が並ぶ。", "region": "Europe and North America"},
{"id": 785, "name": "ペルガモンとその重層的な文化的景観", "nameEn": "Pergamon and its Multi-Layered Cultural Landscape", "country": "トルコ", "lat": 39.1258333333, "lng": 27.18, "era": "古代", "criteria": "(i)(ii)(iii)(iv)", "desc": "ヘレニズム時代にアッタロス朝の首都として繁栄した古代都市。大図書館やアスクレピオンの治療施設で知られ、ローマ・ビザンツ・オスマン期の遺構も重なる。", "region": "Europe and North America"},
{"id": 786, "name": "国立歴史文化公園\"古代メルヴ\"", "nameEn": "State Historical and Cultural Park \"Ancient Merv\"", "country": "トルクメニスタン", "lat": 37.70083, "lng": 62.1775, "era": "古代〜中世", "criteria": "(ii)(iii)", "desc": "中央アジアのシルクロード上に位置するオアシス都市遺跡。約4000年の歴史を持ち、セルジューク朝期には世界最大級の都市として繁栄した。", "region": "Asia and the Pacific"},
{"id": 787, "name": "カスビのブガンダ王国歴代国王の墓", "nameEn": "Tombs of Buganda Kings at Kasubi", "country": "ウガンダ", "lat": 0.348611111, "lng": 32.55138889, "era": "近現代", "criteria": "(i)(iii)(iv)", "desc": "1882年に建てられたブガンダ王国の宮殿を1884年に王墓に転用。木・茅葺など有機素材による円形ドーム建築で、4人の歴代国王が眠る聖地である。", "region": "Africa"},
{"id": 788, "name": "ルウェンゾリ山地国立公園", "nameEn": "Rwenzori Mountains National Park", "country": "ウガンダ", "lat": 0.223611111, "lng": 29.92416667, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "アフリカ第3位のマルゲリータ峰（5109m）を含む約10万haの山岳公園。氷河や滝、巨大ヘザーなど独特の高山植生と希少種の生息地である。", "region": "Africa"},
{"id": 789, "name": "ブウィンディ原生国立公園", "nameEn": "Bwindi Impenetrable National Park", "country": "ウガンダ", "lat": -1.047, "lng": 29.692, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "ウガンダ南西部の約3万2000haの山地林。絶滅危惧種マウンテンゴリラの重要な生息地で、樹木160種以上・シダ100種以上の豊かな生物多様性を持つ。", "region": "Africa"},
{"id": 790, "name": "タウリカのヘルソネソスとそのコーラ", "nameEn": "Ancient City of Tauric Chersonese and its Chora", "country": "ウクライナ", "lat": 44.6108333333, "lng": 33.4913888889, "era": "古代", "criteria": "(ii)(v)", "desc": "紀元前5世紀にドーリア系ギリシア人が黒海北岸に建設した植民都市。均等区画のブドウ畑（コーラ）が残り、古代ポリスの民主的土地分配を示す。", "region": "Europe and North America"},
{"id": 791, "name": "ファヤの古景観", "nameEn": "Faya Palaeolandscape", "country": "アラブ首長国連邦", "lat": 25.0828055556, "lng": 55.8065833333, "era": "先史", "criteria": "(iii)(iv)", "desc": "21万〜6000年前の旧石器・新石器時代の人類居住痕跡が残る遺跡。極度の乾燥環境下で狩猟採集民や牧畜民がいかに適応したかを示す考古学的証拠である。", "region": "Arab States"},
{"id": 792, "name": "ドーセットと東デヴォンの海岸", "nameEn": "Dorset and East Devon Coast", "country": "イギリス", "lat": 50.70555556, "lng": -2.989888889, "era": "自然遺産", "criteria": "(viii)", "desc": "中生代の約1億8500万年にわたる地層が連続的に露出する「ジュラシック・コースト」。300年以上にわたり地球科学研究に貢献してきた化石産地である。", "region": "Europe and North America"},
{"id": 793, "name": "ダーウェント峡谷の工場群", "nameEn": "Derwent Valley Mills", "country": "イギリス", "lat": 53.02888889, "lng": -1.488055556, "era": "近現代", "criteria": "(ii)(iv)", "desc": "リチャード・アークライトの紡績機が初めて工業規模で稼働したクロムフォード工場を含む産業景観。18〜19世紀の綿工場と労働者住宅が一体で残る。", "region": "Europe and North America"},
{"id": 794, "name": "バース市街", "nameEn": "City of Bath", "country": "イギリス", "lat": 51.3813055556, "lng": -2.3590555556, "era": "古代〜近世", "criteria": "(i)(ii)(iv)", "desc": "ローマ時代に温泉地として建設され、18世紀にジョージ3世の治世下でパラディオ様式の新古典主義建築が整備された優雅な都市。ローマ浴場跡が残る。", "region": "Europe and North America"},
{"id": 795, "name": "ヘンダーソン島", "nameEn": "Henderson Island", "country": "イギリス", "lat": -24.3666666667, "lng": -128.333333333, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "南太平洋東部に浮かぶほぼ無人の隆起サンゴ環礁。固有植物10種・固有陸鳥4種が生息し、人為的影響をほとんど受けていない島嶼生態系を保つ。", "region": "Europe and North America"},
{"id": 796, "name": "セント・キルダ", "nameEn": "St Kilda", "country": "イギリス", "lat": 57.81722222, "lng": -8.576666667, "era": "先史", "criteria": "(iii)(v)(vii)(ix)(x)", "desc": "ヘブリディーズ諸島沖の火山性群島で、ヨーロッパ最大級の断崖にカツオドリ等の海鳥が大営巣地を形成。1930年に無人化するまで2000年以上の居住痕跡が残る複合遺産。", "region": "Europe and North America"},
{"id": 797, "name": "ストーンヘンジ、エーヴベリーと関連する遺跡群", "nameEn": "Stonehenge, Avebury and Associated Sites", "country": "イギリス", "lat": 51.17888889, "lng": -1.825277778, "era": "先史", "criteria": "(i)(ii)(iii)", "desc": "ウィルトシャーに位置する世界的に有名な新石器時代の巨石環状列石群。天文学的配置が指摘され、先史時代の信仰と技術を伝える貴重な遺跡である。", "region": "Europe and North America"},
{"id": 798, "name": "フロー・カントリー", "nameEn": "The Flow Country", "country": "イギリス", "lat": 58.3991666667, "lng": -4.0461111111, "era": "自然遺産", "criteria": "(ix)", "desc": "スコットランド北部に広がる約9000年にわたり成長を続ける毛布状泥炭湿地。大規模な炭素貯蔵機能を持ち、地球上で類を見ない泥炭地生態系である。", "region": "Europe and North America"},
{"id": 799, "name": "キルワ・キシワニとソンゴ・ムナラの遺跡群", "nameEn": "Ruins of Kilwa Kisiwani and Ruins of Songo Mnara", "country": "タンザニア", "lat": -8.95778, "lng": 39.52278, "era": "中世", "criteria": "(iii)", "desc": "13〜16世紀にインド洋交易の中心として栄えた東アフリカの港湾都市遺跡。金・銀・中国磁器などの国際交易を担い、スワヒリ文化の繁栄を伝える。", "region": "Africa"},
{"id": 800, "name": "セレンゲティ国立公園", "nameEn": "Serengeti National Park", "country": "タンザニア", "lat": -2.33333, "lng": 34.56667, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "約150万haのサバンナに広がる国立公園。ヌー・シマウマ・ガゼルなど大型草食動物の大移動は地球上で最も壮大な野生動物の生態現象の一つである。", "region": "Africa"},
{"id": 801, "name": "エバーグレーズ国立公園", "nameEn": "Everglades National Park", "country": "アメリカ合衆国", "lat": 25.55444444, "lng": -80.99638889, "era": "自然遺産", "criteria": "(viii)(ix)(x)", "desc": "フロリダ半島南端に広がる亜熱帯性湿地帯。「草の川」と呼ばれる独特の水環境にマナティーやワニなど多くの希少種が生息するが、危機遺産に登録されている。", "region": "Europe and North America"},
{"id": 802, "name": "ザンジバル島のストーン・タウン", "nameEn": "Stone Town of Zanzibar", "country": "タンザニア", "lat": -6.16306, "lng": 39.18917, "era": "中世〜近世", "criteria": "(ii)(iii)", "desc": "東アフリカ・スワヒリ海岸の代表的交易都市。アフリカ・アラブ・インド・ヨーロッパの文化が1000年以上にわたり融合した独自の都市景観を保つ。", "region": "Africa"},
{"id": 803, "name": "チャコ文化", "nameEn": "Chaco Culture", "country": "アメリカ合衆国", "lat": 36.06377778, "lng": -107.9708333, "era": "古代〜中世", "criteria": "(iii)", "desc": "850〜1250年に栄えたプエブロ文化の中心地チャコ・キャニオン。大規模な儀式用建造物群が残り、先住民の高度な建築技術と社会組織を示す。", "region": "Europe and North America"},
{"id": 804, "name": "ホープウェルの儀式用土塁群", "nameEn": "Hopewell Ceremonial Earthworks", "country": "アメリカ合衆国", "lat": 40.0536583333, "lng": -82.4460611111, "era": "古代", "criteria": "(i)(iii)", "desc": "約2000〜1600年前にオハイオ川流域に築かれた8つの巨大土塁群。正確な幾何学形状と太陽・月の周期に合わせた配置がホープウェル文化の高度な知識を示す。", "region": "Europe and North America"},
{"id": 805, "name": "グレート・スモーキー山脈国立公園", "nameEn": "Great Smoky Mountains National Park", "country": "アメリカ合衆国", "lat": 35.59305556, "lng": -83.43555556, "era": "自然遺産", "criteria": "(vii)(viii)(ix)(x)", "desc": "約20万ha以上に広がるアパラチア山脈の自然公園。3500種以上の植物と世界最多級のサンショウウオ類が生息し、人の影響を受ける前の温帯林を伝える。", "region": "Europe and North America"},
{"id": 806, "name": "シャーロッツビルのモンティチェロとバージニア大学", "nameEn": "Monticello and the University of Virginia in Charlottesville", "country": "アメリカ合衆国", "lat": 38.03277778, "lng": -78.50388889, "era": "近現代", "criteria": "(i)(iv)", "desc": "第3代大統領トマス・ジェファソンが設計した邸宅モンティチェロとバージニア大学。古典主義に基づく新古典様式で、新生アメリカの理想を建築に体現した。", "region": "Europe and North America"},
{"id": 807, "name": "マンモス・ケーブ国立公園", "nameEn": "Mammoth Cave National Park", "country": "アメリカ合衆国", "lat": 37.18722222, "lng": -86.10305556, "era": "自然遺産", "criteria": "(vii)(viii)(x)", "desc": "ケンタッキー州にある世界最長の洞窟系で、探査済みの通路は560km以上に及ぶ。石灰岩のカルスト地形が生み出した地下空間に希少な洞窟生物が生息する。", "region": "Europe and North America"},
{"id": 808, "name": "オリンピック国立公園", "nameEn": "Olympic National Park", "country": "アメリカ合衆国", "lat": 47.74833333, "lng": -123.4488889, "era": "自然遺産", "criteria": "(vii)(ix)", "desc": "ワシントン州北西部に位置し、氷河を頂く山岳・温帯雨林・100kmの原生海岸線を含む多様な生態系を擁する。太平洋岸北西部で最も保存状態の良い温帯雨林が残る。", "region": "Europe and North America"},
{"id": 809, "name": "タオス・プエブロ", "nameEn": "Taos Pueblo", "country": "アメリカ合衆国", "lat": 36.438, "lng": -105.546, "era": "古代〜近世", "criteria": "(iv)", "desc": "リオ・グランデ支流の谷に位置する日干しレンガ造りの先住民集落。プエブロ・インディアンが約1000年にわたり居住を続ける生きた文化遺産である。", "region": "Europe and North America"},
{"id": 810, "name": "フライ・ベントスの産業景観", "nameEn": "Fray Bentos Industrial Landscape", "country": "ウルグアイ", "lat": -33.1177777778, "lng": -58.3316666667, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1859年創業のリービッヒ社の食肉加工工場を中心とする産業遺産。肉エキスやコンビーフの製造・輸出で、世界規模の食肉産業の歴史を物語る。", "region": "Latin America and the Caribbean"},
{"id": 811, "name": "技師エラディオ・ディエステの作品：アトランティダの教会", "nameEn": "The work of engineer Eladio Dieste: Church of Atlántida", "country": "ウルグアイ", "lat": -34.7439194444, "lng": -55.7664083333, "era": "近現代", "criteria": "(iv)", "desc": "1960年に竣工したエラディオ・ディエステ設計の教会。補強レンガによる波打つ壁面とガウス曲面の屋根が、ラテンアメリカ近代建築の革新性を示す。", "region": "Latin America and the Caribbean"},
{"id": 812, "name": "コロニア・デル・サクラメントの歴史的街並み", "nameEn": "Historic Quarter of the City of Colonia del Sacramento", "country": "ウルグアイ", "lat": -34.47119, "lng": -57.849898, "era": "近世", "criteria": "(iv)", "desc": "1680年にポルトガル人がラ・プラタ川沿いに建設した植民都市。ポルトガル・スペイン両国の支配を経て、二つの植民様式が融合した街並みが残る。", "region": "Latin America and the Caribbean"},
{"id": 813, "name": "ブハラ歴史地区", "nameEn": "Historic Centre of Bukhara", "country": "ウズベキスタン", "lat": 39.77472, "lng": 64.42861, "era": "中世", "criteria": "(ii)(iv)", "desc": "シルクロード上に2000年以上の歴史を持つ中央アジア最も完全な中世都市。10世紀のイスマーイール・サーマーニー廟や17世紀のマドラサ群が残る。", "region": "Asia and the Pacific"},
{"id": 814, "name": "カラカスの大学都市", "nameEn": "Ciudad Universitaria de Caracas", "country": "ベネズエラ", "lat": 10.49073, "lng": -66.89068, "era": "近現代", "criteria": "(i)(iv)", "desc": "建築家カルロス・ラウル・ビジャヌエバが1940〜60年に設計した大学キャンパス。アレクサンダー・カルダーの「雲」など現代美術と建築が融合した近代建築の傑作。", "region": "Latin America and the Caribbean"},
{"id": 815, "name": "首長ロイ・マタの領地", "nameEn": "Chief Roi Mata's Domain", "country": "バヌアツ", "lat": -17.6280694444, "lng": 168.1777194444, "era": "近世", "criteria": "(iii)(v)", "desc": "17世紀初頭の最高首長ロイ・マタに関連する3遺跡群。居住地・死去地・集団埋葬地からなり、口承伝統と考古学が一致するオセアニア独自の文化遺産である。", "region": "Asia and the Pacific"},
{"id": 816, "name": "カナイマ国立公園", "nameEn": "Canaima National Park", "country": "ベネズエラ", "lat": 5.337994, "lng": -62.037883, "era": "自然遺産", "criteria": "(vii)(viii)(ix)(x)", "desc": "約300万haの敷地にテーブルマウンテン（テプイ）が林立する南米の自然公園。世界最大落差約1000mのエンジェル・フォールを擁する壮大な景観が広がる。", "region": "Latin America and the Caribbean"},
{"id": 817, "name": "サマルカンド—文化交差路", "nameEn": "Samarkand – Crossroad of Cultures", "country": "ウズベキスタン", "lat": 39.66861, "lng": 67.0, "era": "古代〜中世", "criteria": "(i)(ii)(iv)", "desc": "紀元前7世紀に建設され、14〜15世紀のティムール朝時代に最盛期を迎えた都市。レギスタン広場のマドラサ群やグーリ・アミール廟など壮麗なイスラム建築が残る。", "region": "Asia and the Pacific"},
{"id": 818, "name": "ハノイのタンロン皇城の中心区域", "nameEn": "Central Sector of the Imperial Citadel of Thang Long - Hanoi", "country": "ベトナム", "lat": 21.03752, "lng": 105.838623, "era": "中世", "criteria": "(ii)(iii)", "desc": "11世紀に李朝が建設した皇城で、約13世紀にわたりベトナムの政治的中心であった。中国とチャンパ王国の影響が交差する紅河デルタ独自の文化を反映する。", "region": "Asia and the Pacific"},
{"id": 819, "name": "ハロン湾—カットバ群島", "nameEn": "Ha Long Bay - Cat Ba Archipelago", "country": "ベトナム", "lat": 20.8327777778, "lng": 107.1611111111, "era": "自然遺産", "criteria": "(vii)(viii)", "desc": "約1133の石灰岩の島々が海面からそびえる壮大な海洋カルスト景観。面積約6万5650haに及び、世界最大規模の海侵タワーカルスト地形として知られる。", "region": "Asia and the Pacific"},
{"id": 820, "name": "胡朝の城塞", "nameEn": "Citadel of the Ho Dynasty", "country": "ベトナム", "lat": 20.0780555556, "lng": 105.6047222222, "era": "中世", "criteria": "(ii)(iv)", "desc": "14世紀末に風水思想に基づき築かれた胡朝の城塞。巨大な石材を用いた城壁が残り、東南アジアにおける朱子学の広がりと帝都建設の革新性を示す。", "region": "Asia and the Pacific"},
{"id": 821, "name": "ミーソン聖域", "nameEn": "My Son Sanctuary", "country": "ベトナム", "lat": 15.773843, "lng": 108.109169, "era": "古代〜中世", "criteria": "(ii)(iii)", "desc": "4〜13世紀にチャンパ王国の宗教的中心地として栄えたヒンドゥー教寺院群。インド文化の影響を受けた塔状祠堂が密林の中に残り、東南アジア独自の信仰を伝える。", "region": "Asia and the Pacific"},
{"id": 822, "name": "チャンアンの景観複合体", "nameEn": "Trang An Landscape Complex", "country": "ベトナム", "lat": 20.2566666667, "lng": 105.8963888889, "era": "先史", "criteria": "(v)(vii)(viii)", "desc": "紅河デルタ南縁のカルスト地形に3万年以上の人類居住痕跡が残る複合遺産。10〜11世紀のベトナム古都ホアルーを含み、寺院や水田が景観を彩る。", "region": "Asia and the Pacific"},
{"id": 823, "name": "ソコトラ諸島", "nameEn": "Socotra Archipelago", "country": "イエメン", "lat": 12.5, "lng": 53.8333333333, "era": "自然遺産", "criteria": "(x)", "desc": "アデン湾近くのインド洋に浮かぶ4島からなる群島。植物の37%、爬虫類の90%が固有種という驚異的な生物多様性を持つ「インド洋のガラパゴス」である。", "region": "Arab States"},
{"id": 824, "name": "モシ・オ・トゥニャ／ヴィクトリアの滝", "nameEn": "Mosi-oa-Tunya / Victoria Falls", "country": "ザンビア/ジンバブエ", "lat": -17.92453, "lng": 25.85539, "era": "自然遺産", "criteria": "(vii)(viii)", "desc": "幅2km以上のザンベジ川が玄武岩の峡谷に落下する世界三大瀑布の一つ。水煙は20km先からも見え、現地語で「雷鳴のする水煙」を意味する。", "region": "Africa"},
{"id": 825, "name": "オフリド地域の自然遺産及び文化遺産", "nameEn": "Natural and Cultural Heritage of the Ohrid region", "country": "北マケドニア/アルバニア", "lat": 40.9918333333, "lng": 20.7041666667, "era": "古代〜中世", "criteria": "(i)(iii)(iv)(vii)", "desc": "第三紀由来の固有種が生息するオフリド湖と、湖畔に栄えた欧州最古級の集落。最古のスラヴ修道院や800点以上のビザンツ様式イコンが残る複合遺産である。", "region": "Europe and North America"},
{"id": 826, "name": "ティパサ", "nameEn": "Tipasa", "country": "アルジェリア", "lat": 36.55, "lng": 2.383333333, "era": "古代", "criteria": "(iii)(iv)", "desc": "地中海沿岸のフェニキア交易拠点をローマが征服し軍事拠点とした都市遺跡。フェニキア・ローマ・初期キリスト教・ビザンツの遺構とマウレタニア王墓が共存する。", "region": "Arab States"},
{"id": 827, "name": "アンティグアの造船所と関連考古遺跡群", "nameEn": "Antigua Naval Dockyard and Related Archaeological Sites", "country": "アンティグア・バーブーダ", "lat": 17.0069444444, "lng": -61.7616666667, "era": "近世", "criteria": "(ii)(iv)", "desc": "18世紀末に英国海軍が建設したジョージア様式の海軍造船所。カリブ海東部の制海権争いの拠点であり、奴隷労働による植民地経済の歴史も物語る。", "region": "Latin America and the Caribbean"},
{"id": 828, "name": "コルドバのイエズス会管区とエスタンシア群", "nameEn": "Jesuit Block and Estancias of Córdoba", "country": "アルゼンチン", "lat": -31.42056, "lng": -64.19111, "era": "近世", "criteria": "(ii)(iv)", "desc": "17〜18世紀にイエズス会が建設した大学・教会・農場群。150年以上にわたる宗教的・社会的・経済的実験を伝える南米植民地時代の重要な遺産である。", "region": "Latin America and the Caribbean"},
{"id": 829, "name": "エチミアジンの大聖堂と教会群及びズヴァルトノツの考古遺跡", "nameEn": "Cathedral and Churches of Echmiatsin and the Archaeological Site of Zvartnots", "country": "アルメニア", "lat": 40.15931, "lng": 44.29514, "era": "古代〜中世", "criteria": "(ii)(iii)", "desc": "アルメニア使徒教会の総本山エチミアジン大聖堂と7世紀のズヴァルトノツ聖堂遺跡。十字集中式ドーム建築の発展を示し、周辺地域の教会建築に大きな影響を与えた。", "region": "Europe and North America"},
{"id": 830, "name": "ル・コルビュジエの建築作品—近代建築運動への顕著な貢献", "nameEn": "The Architectural Work of Le Corbusier, an Outstanding Contribution to the Modern Movement", "country": "インド/日本/フランス/ベルギー/スイス/アルゼンチン/ドイツ", "lat": 46.4684138889, "lng": 6.8293361111, "era": "近現代", "criteria": "(i)(ii)", "desc": "7か国に点在するル・コルビュジエの17作品群。国立西洋美術館やユニテ・ダビタシオンなど、20世紀の近代建築運動を象徴する国境を越えた遺産である。", "region": "Latin America and the Caribbean"},
{"id": 831, "name": "カパック・ニャン：アンデスの道", "nameEn": "Qhapaq Ñan, Andean Road System", "country": "ペルー/チリ/エクアドル/コロンビア/アルゼンチン/ボリビア", "lat": -18.25, "lng": -69.5916666667, "era": "古代〜近世", "criteria": "(ii)(iii)(iv)", "desc": "インカ帝国が築いた全長約3万kmの道路網。標高6000m超のアンデス山脈から海岸まで6か国にまたがり、帝国の通信・交易・軍事を支えた壮大なインフラである。", "region": "Latin America and the Caribbean"},
{"id": 832, "name": "カガリ（フレーザー島）", "nameEn": "K'gari", "country": "オーストラリア", "lat": -25.21666667, "lng": 153.1333333, "era": "自然遺産", "criteria": "(vii)(viii)(ix)", "desc": "全長122kmの世界最大の砂島。砂地に熱帯雨林が育ち、世界の半数以上の砂丘淡水湖がある。砂丘・森林・湖が織りなす独特の自然景観が評価された。", "region": "Asia and the Pacific"},
{"id": 833, "name": "タスマニア原生地域", "nameEn": "Tasmanian Wilderness", "country": "オーストラリア", "lat": -43.1184722222, "lng": 146.2305555556, "era": "自然遺産", "criteria": "(iii)(iv)(vii)(viii)(ix)(x)", "desc": "100万ha以上に及ぶ世界最後の温帯雨林地帯の一つ。氷河地形の峡谷が広がり、石灰岩洞窟からは2万年以上前の人類居住の痕跡も発見されている複合遺産。", "region": "Asia and the Pacific"},
{"id": 834, "name": "ウルル＝カタ・ジュタ国立公園", "nameEn": "Ulu<U>r</U>u-Kata Tju<U>t</U>a National Park", "country": "オーストラリア", "lat": -25.33333333, "lng": 131.0, "era": "先史", "criteria": "(v)(vii)(viii)", "desc": "オーストラリア中央部の赤い砂漠に聳える巨大な一枚岩ウルル（エアーズロック）と岩山群カタ・ジュタ。アナング族の聖地として数万年の信仰を伝える複合遺産。", "region": "Asia and the Pacific"},
{"id": 835, "name": "グラーツ市歴史地区とエッゲンベルク城", "nameEn": "City of Graz – Historic Centre and Schloss Eggenberg", "country": "オーストリア", "lat": 47.0730555556, "lng": 15.4386111111, "era": "中世〜近世", "criteria": "(ii)(iv)", "desc": "ハプスブルク家の影響を受けた中欧の都市景観。中世からバロック期までの建築様式が調和し、エッゲンベルク城は17世紀の宇宙観を反映した宮殿建築である。", "region": "Europe and North America"},
{"id": 836, "name": "フェルテー湖／ノイジードラー湖の文化的景観", "nameEn": "Fertö / Neusiedlersee Cultural Landscape", "country": "オーストリア/ハンガリー", "lat": 47.71927778, "lng": 16.72272222, "era": "中世〜近現代", "criteria": "(v)", "desc": "8000年にわたり異文化が交わってきた中欧の湖畔地域。ノイジードラー湖周辺の農村建築や18〜19世紀の宮殿が、人と自然の共生的な景観を形成する。", "region": "Europe and North America"},
{"id": 837, "name": "ハルシュタット—ダッハシュタイン・ザルツカンマーグートの文化的景観", "nameEn": "Hallstatt-Dachstein / Salzkammergut Cultural Landscape", "country": "オーストリア", "lat": 47.55944444, "lng": 13.64638889, "era": "先史", "criteria": "(iii)(iv)", "desc": "紀元前2千年紀から岩塩採掘で栄えたアルプスの湖畔集落。ハルシュタット文化（鉄器時代）の名称の由来地であり、塩の交易がもたらした繁栄を今に伝える。", "region": "Europe and North America"},
{"id": 838, "name": "ザルツブルク市街の歴史地区", "nameEn": "Historic Centre of the City of Salzburg", "country": "オーストリア", "lat": 47.80055556, "lng": 13.04333333, "era": "中世〜近世", "criteria": "(ii)(iv)", "desc": "大司教が治めた都市国家で、モーツァルトの生誕地として知られる。ゴシックからバロックまでの建築が融合し、北欧と南欧の文化が交差する都市景観を持つ。", "region": "Europe and North America"},
{"id": 839, "name": "ゼメリング鉄道", "nameEn": "Semmering Railway", "country": "オーストリア", "lat": 47.64877778, "lng": 15.82797222, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1848〜54年に建設された全長41kmの山岳鉄道。トンネルや高架橋を駆使した鉄道黎明期の土木工学の傑作で、現在も現役路線として使用されている。", "region": "Europe and North America"},

{"id": 841, "name": "ディルムンの墳墓群", "nameEn": "Dilmun Burial Mounds", "country": "バーレーン", "lat": 26.1497222222, "lng": 50.5127777778, "era": "古代", "criteria": "(iii)(iv)", "desc": "紀元前2200〜1750年に築かれた約1万1774基の墳墓群。ディルムン文明の交易繁栄を背景に、全住民に適用された精巧な埋葬文化を示す世界的にも稀な遺跡。", "region": "Arab States"},
{"id": 842, "name": "バゲルハットのモスク都市", "nameEn": "Historic Mosque City of Bagerhat", "country": "バングラデシュ", "lat": 22.66667, "lng": 89.8, "era": "中世", "criteria": "(iv)", "desc": "15世紀にトルコ系将軍ウルグ・ハーン・ジャハーンが建設した都市。ガンジス・ブラマプトラ川合流域に位置し、レンガ造りのモスクや初期イスラム建造物が多数残る。", "region": "Asia and the Pacific"},
{"id": 843, "name": "ブリッジタウン歴史地区とその要塞", "nameEn": "Historic Bridgetown and its Garrison", "country": "バルバドス", "lat": 13.0966666667, "lng": -59.6138888889, "era": "近世", "criteria": "(ii)(iii)(iv)", "desc": "17〜19世紀に建設された英国植民地建築の好例。蛇行する街路配置がスペイン・オランダの格子状植民都市とは異なるイギリス式の都市計画を示す。", "region": "Latin America and the Caribbean"},

{"id": 845, "name": "ビャウォヴィエジャの森", "nameEn": "Białowieża Forest", "country": "ポーランド/ベラルーシ", "lat": 52.7275, "lng": 23.9811111111, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "ポーランドとベラルーシの国境に広がる約14万haのヨーロッパ最大級の原生林。ヨーロッパバイソンの最大の生息地であり、針葉樹と広葉樹が混交する貴重な森林である。", "region": "Europe and North America"},
{"id": 846, "name": "シュトゥルーヴェの測地弧", "nameEn": "Struve Geodetic Arc", "country": "ラトビア/ノルウェー/スウェーデン/ベラルーシ/エストニア/フィンランド/ウクライナ/リトアニア/モルドバ/ロシア", "lat": 59.0577777778, "lng": 26.3377777777, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1816〜55年に天文学者シュトゥルーヴェがノルウェーから黒海まで10か国・2820kmにわたり実施した三角測量点群。地球の大きさと形状の精密測定に貢献した科学遺産。", "region": "Europe and North America"},
{"id": 847, "name": "ブルッヘ歴史地区", "nameEn": "Historic Centre of Brugge", "country": "ベルギー", "lat": 51.20891, "lng": 3.22527, "era": "中世", "criteria": "(ii)(iv)", "desc": "中世ヨーロッパ有数の商業・文化都市。ゴシック建築が残る運河の街並みが保存され、フランドル原始派絵画の中心地としても知られる。", "region": "Europe and North America"},

{"id": 851, "name": "ポトシ市街", "nameEn": "City of Potosí", "country": "ボリビア", "lat": -19.599112, "lng": -65.749813, "era": "近世", "criteria": "(ii)(iv)", "desc": "16世紀に世界最大の産業複合体とされた銀山都市。セロ・リコ銀山と水力精錬施設、造幣局カサ・デ・ラ・モネダなどが植民地時代の銀産業の繁栄を伝える。", "region": "Latin America and the Caribbean"},

{"id": 855, "name": "ステチュツィ—中世の墓碑群の墓地", "nameEn": "Stećci Medieval Tombstone Graveyards", "country": "セルビア/クロアチア/モンテネグロ/ボスニア・ヘルツェゴビナ", "lat": 43.0922138889, "lng": 17.9240527778, "era": "中世", "criteria": "(iii)", "desc": "12〜16世紀に4か国にまたがる28か所に築かれた石灰岩製の中世墓碑群。多様な装飾モチーフや碑文がバルカン地域独自の葬送文化を伝える。", "region": "Europe and North America"},

{"id": 872, "name": "カナディアン・ロッキー山脈自然公園群", "nameEn": "Canadian Rocky Mountain Parks", "country": "カナダ", "lat": 51.42472222, "lng": -116.4797222, "era": "自然遺産", "criteria": "(vii)(viii)", "desc": "バンフ・ジャスパーなど4国立公園と3州立公園からなるロッキー山脈の自然公園群。氷河・湖・峡谷に加え、カンブリア紀の化石で有名なバージェス頁岩を含む。", "region": "Europe and North America"},

{"id": 874, "name": "ジョギンズの化石断崖群", "nameEn": "Joggins Fossil Cliffs", "country": "カナダ", "lat": 45.7097222222, "lng": -64.4358333333, "era": "自然遺産", "criteria": "(viii)", "desc": "ノバスコシア州沿岸の石炭紀（約3億1800万〜3億300万年前）の化石産地。「石炭紀のガラパゴス」と称され、最古級の陸上動物の化石記録が残る。", "region": "Europe and North America"},

{"id": 877, "name": "グラン・プレの景観", "nameEn": "Landscape of Grand Pré", "country": "カナダ", "lat": 45.1183333333, "lng": -64.3072222222, "era": "近世", "criteria": "(v)", "desc": "ノバスコシア州でアカディア人が17世紀に堤防と木製水門で干拓した農業景観。1755年の大追放の記念碑でもあり、平均潮差11.6mの極端な環境への適応を示す。", "region": "Europe and North America"},
{"id": 878, "name": "リドー運河", "nameEn": "Rideau Canal", "country": "カナダ", "lat": 44.9943861111, "lng": -75.765125, "era": "近現代", "criteria": "(i)(iv)", "desc": "19世紀初頭に英国が軍事目的で建設した全長202kmの運河。オタワからキングストンまでを結び、北米に現存する唯一の運河建設黄金期の現役運河である。", "region": "Europe and North America"},
{"id": 879, "name": "ウォータートン・グレイシャー国際平和自然公園", "nameEn": "Waterton Glacier International Peace Park", "country": "カナダ/アメリカ合衆国", "lat": 48.99605556, "lng": -113.9041667, "era": "自然遺産", "criteria": "(vii)(ix)", "desc": "1932年に世界初の国際平和公園として設立されたカナダ・米国国境の自然公園。草原・森林・高山・氷河など多様な景観と豊かな動植物相を持つ。", "region": "Europe and North America"},
{"id": 880, "name": "エネディ山地：自然的・文化的景観", "nameEn": "Ennedi Massif: Natural and Cultural Landscape", "country": "チャド", "lat": 17.0416666667, "lng": 21.8627777778, "era": "先史", "criteria": "(iii)(vii)(ix)", "desc": "砂岩が風水食で削られた峡谷・天然アーチが広がるサハラの山塊。数千点の岩壁画はサハラ最大級の集積であり、常在する水が砂漠の生態系を支える複合遺産。", "region": "Africa"},
{"id": 881, "name": "マノヴォ＝グンダ・サン・フローリス国立公園", "nameEn": "Manovo-Gounda St Floris National Park", "country": "中央アフリカ", "lat": 9.0, "lng": 21.5, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "広大なサバンナにクロサイ・ゾウ・チーター・ヒョウなどが生息する国立公園。密猟の深刻化により危機遺産に登録されている。", "region": "Africa"},
{"id": 882, "name": "ハンバーストーンとサンタ・ラウラの硝石工場群", "nameEn": "Humberstone and Santa Laura Saltpeter Works", "country": "チリ", "lat": -20.20582, "lng": -69.79406, "era": "近現代", "criteria": "(ii)(iii)(iv)", "desc": "1880年から60年以上にわたり世界最大の硝石鉱床を採掘・加工した200以上の工場跡。パンピーノスと呼ばれる労働者の独自文化と社会正義運動の歴史を伝える。", "region": "Latin America and the Caribbean"},
{"id": 883, "name": "ラパ・ヌイ国立公園", "nameEn": "Rapa Nui National Park", "country": "チリ", "lat": -27.074403, "lng": -109.365683, "era": "古代〜中世", "criteria": "(i)(iii)(v)", "desc": "イースター島の先住名称ラパ・ヌイに由来する国立公園。300年頃に入植したポリネシア人が10〜16世紀に築いたモアイ像約900体が独自の文化的景観を形成する。", "region": "Latin America and the Caribbean"},
{"id": 884, "name": "アリカ・イ・パリナコータ州のチンチョーロ文化の集落と人工ミイラ製造", "nameEn": "Settlement and Artificial Mummification of the Chinchorro Culture in the Arica and Parinacota Region", "country": "チリ", "lat": -18.4819611111, "lng": -70.3215722222, "era": "先史", "criteria": "(iii)(v)", "desc": "紀元前5450〜前890年頃のチンチョーロ文化による世界最古の人工ミイラ。アタカマ砂漠沿岸の海洋狩猟採集民が、社会全階層の遺体に複雑な処置を施した。", "region": "Latin America and the Caribbean"},
{"id": 885, "name": "古都平遥", "nameEn": "Ancient City of Ping Yao", "country": "中国", "lat": 37.20139, "lng": 112.15444, "era": "中世〜近世", "criteria": "(ii)(iii)(iv)", "desc": "14世紀に創建された漢民族の伝統的城郭都市。明清時代の町並みがほぼ完全に残り、19世紀には中国全土の金融を牛耳った票号（為替銀行）の中心地として栄えた。", "region": "Asia and the Pacific"},
{"id": 886, "name": "バダインジャラン砂漠—砂の塔と湖群", "nameEn": "Badain Jaran Desert - Towers of Sand and Lakes", "country": "中国", "lat": 39.8897222222, "lng": 102.2894444444, "era": "自然遺産", "criteria": "(vii)(viii)", "desc": "中国北西部に位置し、比高460mの世界最大の固定砂丘や砂丘間湖の最密集地帯を含む砂漠。「鳴き砂」の最大分布域など比類のない砂漠地形が広がる。", "region": "Asia and the Pacific"},
{"id": 887, "name": "紅河ハニ棚田群の文化的景観", "nameEn": "Cultural Landscape of Honghe Hani Rice Terraces", "country": "中国", "lat": 23.0932777778, "lng": 102.7799805556, "era": "中世〜近現代", "criteria": "(iii)(v)", "desc": "雲南省南部の哀牢山脈から紅河へ連なる棚田群。ハニ族が1300年以上かけて築いた水路システムと赤米栽培の文化的景観は、人と自然の共生の模範である。", "region": "Asia and the Pacific"},
{"id": 888, "name": "梵浄山", "nameEn": "Fanjingshan", "country": "中国", "lat": 27.8955555556, "lng": 108.68, "era": "自然遺産", "criteria": "(x)", "desc": "貴州省の武陵山脈に位置する変成岩の孤立山塊。固有種の梵浄山モミやキンシコウの一種など第三紀起源の生物が多数生息し、亜熱帯最大のブナ原生林を持つ。", "region": "Asia and the Pacific"},
{"id": 889, "name": "湖北省の神農架", "nameEn": "Hubei Shennongjia", "country": "中国", "lat": 31.4697222222, "lng": 110.2077777778, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "中国中部に残る最大の原生林。キンシコウやウンピョウ、チュウゴクオオサンショウウオなど希少動物が生息し、中国三大生物多様性拠点の一つとされる。", "region": "Asia and the Pacific"},
{"id": 890, "name": "ラサのポタラ宮歴史地区群", "nameEn": "Historic Ensemble of the Potala Palace, Lhasa", "country": "中国", "lat": 29.65792, "lng": 91.11717, "era": "中世〜近世", "criteria": "(i)(iv)", "desc": "7世紀以来ダライ・ラマの冬宮であった標高3700mのポタラ宮を中心に、ジョカン寺とノルブリンカを含む。チベット仏教の政治・宗教の中枢を象徴する建築群。", "region": "Asia and the Pacific"},
{"id": 891, "name": "莫高窟", "nameEn": "Mogao Caves", "country": "中国", "lat": 40.13333, "lng": 94.81667, "era": "古代〜中世", "criteria": "(i)(ii)(iii)(iv)(v)", "desc": "シルクロードの要衝・敦煌に位置する492の石窟群。4〜14世紀にわたる約1000年間の仏教美術が塑像や壁画として残り、東西文化交流の一大拠点であった。", "region": "Asia and the Pacific"},
{"id": 892, "name": "峨眉山と楽山大仏", "nameEn": "Mount Emei Scenic Area, including Leshan Giant Buddha Scenic Area", "country": "中国", "lat": 29.5449, "lng": 103.76925, "era": "古代〜中世", "criteria": "(iv)(x)", "desc": "1世紀に中国最初の仏教寺院が建立された四川省の聖山。8世紀に造られた高さ71mの楽山大仏は世界最大の石刻仏像で、亜熱帯から亜高山帯の植生も豊かな複合遺産。", "region": "Asia and the Pacific"},
{"id": 893, "name": "青海可可西里（フフシル）", "nameEn": "Qinghai Hoh Xil", "country": "中国", "lat": 35.3802777778, "lng": 92.4391666667, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "チベット高原北東端の標高4500m以上の高原地帯。年間平均気温が氷点下の極限環境に、チベットカモシカの完全な移動ルートと多数の固有種が保護されている。", "region": "Asia and the Pacific"},
{"id": 894, "name": "元の上都遺跡", "nameEn": "Site of Xanadu", "country": "中国", "lat": 42.358, "lng": 116.1851277778, "era": "中世", "criteria": "(ii)(iii)(iv)", "desc": "1256年にクビライ・ハーンの顧問劉秉忠が設計したモンゴル帝国の伝説的都城跡。遊牧文化と漢文化の融合を試み、元朝の基盤となった約2万5000haの遺跡。", "region": "Asia and the Pacific"},
{"id": 895, "name": "シルクロード：長安＝天山回廊の交易路網", "nameEn": "Silk Roads: the Routes Network of Chang'an-Tianshan Corridor", "country": "中国/キルギス/カザフスタン", "lat": 34.3044444444, "lng": 108.8572222222, "era": "古代〜中世", "criteria": "(ii)(iii)(v)", "desc": "漢・唐の都長安から中央アジアまで約5000kmに及ぶシルクロードの幹線路。紀元前2世紀〜16世紀に交易・宗教・技術の東西交流を担った33構成資産を含む。", "region": "Asia and the Pacific"},
{"id": 896, "name": "四川省のジャイアントパンダ保護区群—臥龍・四姑娘山・夾金山脈", "nameEn": "Sichuan Giant Panda Sanctuaries - Wolong, Mt Siguniang and Jiajin Mountains", "country": "中国", "lat": 30.8333333333, "lng": 103.0, "era": "自然遺産", "criteria": "(x)", "desc": "世界のパンダの30%以上が生息する約92万haの保護区群。第三紀の古熱帯林の遺存種であるジャイアントパンダの最大の連続生息地で、植物も5000〜6000種に及ぶ。", "region": "Asia and the Pacific"},
{"id": 897, "name": "曲阜の孔廟、孔林、孔府", "nameEn": "Temple and Cemetery of Confucius and the Kong Family Mansion in Qufu", "country": "中国", "lat": 35.613215, "lng": 116.994561, "era": "古代〜近世", "criteria": "(i)(iv)", "desc": "紀元前478年に創建された孔子を祀る廟・墓所・孔家邸宅の複合体。2000年以上にわたり歴代皇帝が増改築し、100棟以上の建築と10万基以上の墓が残る。", "region": "Asia and the Pacific"},
{"id": 898, "name": "万里の長城", "nameEn": "The Great Wall", "country": "中国", "lat": 40.41667, "lng": 116.08333, "era": "古代〜近世", "criteria": "(i)(ii)(iii)(iv)", "desc": "紀元前220年頃に秦の始皇帝が統合した北方防御の城壁。明代（1368〜1644年）まで増築が続き、世界最大の軍事建造物として歴史的・建築的価値を持つ。", "region": "Asia and the Pacific"},
{"id": 899, "name": "新疆天山", "nameEn": "Xinjiang Tianshan", "country": "中国", "lat": 41.9683333333, "lng": 80.3541666667, "era": "自然遺産", "criteria": "(vii)(ix)", "desc": "中央アジア最大級の山脈・天山山脈の新疆ウイグル自治区側4構成資産。氷河・草原・森林がタクラマカン砂漠と隣接し、鮮やかなコントラストの景観を見せる。", "region": "Asia and the Pacific"},
{"id": 900, "name": "武陵源の自然景観と歴史地域", "nameEn": "Wulingyuan Scenic and Historic Interest Area", "country": "中国", "lat": 29.33333, "lng": 110.5, "era": "自然遺産", "criteria": "(vii)", "desc": "湖南省に広がる2万6000ha以上の景勝地。高さ200mを超える砂岩の石柱が3000本以上林立し、渓谷・滝・洞窟が織りなす幻想的な景観で知られる。", "region": "Asia and the Pacific"},
{"id": 901, "name": "ロス・カティオス国立公園", "nameEn": "Los Katíos National Park", "country": "コロンビア", "lat": 7.803975, "lng": -77.146271, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "コロンビア北西部の約7万2000haに広がる国立公園。低丘陵・森林・湿原からなり、多数の絶滅危惧動物と固有植物を擁する優れた生物多様性を持つ。", "region": "Latin America and the Caribbean"},
{"id": 902, "name": "ティエラデントロの国立考古公園", "nameEn": "National Archeological Park of Tierradentro", "country": "コロンビア", "lat": 2.583333333, "lng": -76.03333333, "era": "古代〜中世", "criteria": "(iii)", "desc": "6〜10世紀の巨大な地下墳墓（ヒポヘア）が多数残る考古公園。幅12mに及ぶ墓室には住居内装を模した装飾が施され、先ヒスパニック社会の文化的豊かさを示す。", "region": "Latin America and the Caribbean"},
{"id": 903, "name": "グアナカステ保全地域", "nameEn": "Area de Conservación Guanacaste", "country": "コスタリカ", "lat": 10.85, "lng": -85.61666667, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "中米からメキシコ北部にかけて最良の熱帯乾燥林を含む保全地域。陸域・海域の生態系にまたがり、絶滅危惧種を含む豊かな生物多様性の保全拠点である。", "region": "Latin America and the Caribbean"},
{"id": 904, "name": "ニンバ山厳正自然保護区", "nameEn": "Mount Nimba Strict Nature Reserve", "country": "ギニア/コートジボワール", "lat": 7.60318, "lng": -8.39097, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "ギニア・コートジボワール・リベリア国境にそびえる山岳保護区。胎生ヒキガエルや道具を使うチンパンジーなど固有種が生息するが、危機遺産に登録されている。", "region": "Africa"},
{"id": 905, "name": "スプリットの史跡群とディオクレティアヌス宮殿", "nameEn": "Historical Complex of Split with the Palace of Diocletian", "country": "クロアチア", "lat": 43.5088888889, "lng": 16.4391666667, "era": "古代〜中世", "criteria": "(ii)(iii)(iv)", "desc": "3〜4世紀にローマ皇帝ディオクレティアヌスが建設した宮殿跡を核とする歴史地区。中世の大聖堂やゴシック・ルネサンス様式の建築が宮殿遺構と一体をなす。", "region": "Europe and North America"},
{"id": 906, "name": "ポレッチ歴史地区のエウフラシウス聖堂建築群", "nameEn": "Episcopal Complex of the Euphrasian Basilica in the Historic Centre of Poreč", "country": "クロアチア", "lat": 45.2285833333, "lng": 13.5933333333, "era": "古代〜中世", "criteria": "(ii)(iii)(iv)", "desc": "4世紀からキリスト教が根付いたポレッチの司教座建築群。バシリカ・洗礼堂・司教宮殿が現存し、古典様式とビザンツ様式が融合した宗教建築の傑作である。", "region": "Europe and North America"},
{"id": 907, "name": "タイ国立公園", "nameEn": "Taï National Park", "country": "コートジボワール", "lat": 5.6488888889, "lng": -7.0952777778, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "西アフリカに残る最大級の原生熱帯林。コビトカバやサル11種など絶滅危惧哺乳類が生息し、熱帯林生態系の科学的研究において重要な価値を持つ。", "region": "Africa"},
{"id": 908, "name": "シベニクの聖ヤコブ大聖堂", "nameEn": "The Cathedral of St James in Šibenik", "country": "クロアチア", "lat": 43.73629, "lng": 15.89038, "era": "中世〜近世", "criteria": "(i)(ii)(iv)", "desc": "1431〜1535年に全て石造りで建設されたダルマチア海岸の大聖堂。71の人物彫刻フリーズが特徴で、ゴシックとルネサンスの融合を示す建築技術の傑作。", "region": "Europe and North America"},
{"id": 909, "name": "スターリ・グラード平原", "nameEn": "Stari Grad Plain", "country": "クロアチア", "lat": 43.1816666667, "lng": 16.6386111111, "era": "古代", "criteria": "(ii)(iii)(v)", "desc": "紀元前4世紀にギリシア人が入植したフヴァル島の農業景観。古代ギリシアの幾何学的土地区画（コーラ）が24世紀にわたりほぼ無傷で残り、ブドウとオリーブ栽培が続く。", "region": "Europe and North America"},
{"id": 910, "name": "キューバ南東部における最初のコーヒー農園の考古的景観", "nameEn": "Archaeological Landscape of the First Coffee Plantations in the South-East of Cuba", "country": "キューバ", "lat": 20.03, "lng": -75.39138889, "era": "近現代", "criteria": "(iii)(iv)", "desc": "シエラ・マエストラ山麓に残る19世紀のコーヒー農園群の遺跡。困難な地形での先駆的農業の証拠であり、カリブ地域の経済・社会・技術史を伝える。", "region": "Latin America and the Caribbean"},
{"id": 911, "name": "グランマ号上陸記念国立公園", "nameEn": "Desembarco del Granma National Park", "country": "キューバ", "lat": 19.88333, "lng": -77.63333, "era": "自然遺産", "criteria": "(vii)(viii)", "desc": "キューバ南東部カボ・クルス周辺に位置し、隆起海成段丘とカルスト地形が発達する国立公園。西大西洋有数の壮大な海岸断崖と地形形成過程が評価された。", "region": "Latin America and the Caribbean"},
{"id": 912, "name": "ヒロキティア", "nameEn": "Choirokoitia", "country": "キプロス", "lat": 34.7967406661, "lng": 33.3439431453, "era": "先史", "criteria": "(ii)(iii)(iv)", "desc": "紀元前7千年紀〜前4千年紀に営まれた東地中海で最も重要な新石器時代集落遺跡の一つ。円形住居跡が残り、人類社会の進化解明に貴重な考古学的知見を提供する。", "region": "Europe and North America"},
{"id": 913, "name": "サンティアゴ・デ・クーバのサン・ペドロ・デ・ラ・ロカ城", "nameEn": "San Pedro de la Roca Castle, Santiago de Cuba", "country": "キューバ", "lat": 19.968446, "lng": -75.870441, "era": "近世", "criteria": "(iv)(v)", "desc": "17世紀のカリブ海覇権争いの中でサンティアゴ港防衛のために築かれた要塞群。イタリア・ルネサンスの設計原理に基づくスペイン系軍事建築の最良の遺例である。", "region": "Latin America and the Caribbean"},
{"id": 914, "name": "シエンフエーゴスの都市歴史地区", "nameEn": "Urban Historic Centre of Cienfuegos", "country": "キューバ", "lat": 22.145887, "lng": -80.452183, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1819年にフランス系移民が建設した新古典主義様式の植民都市。19世紀ラテンアメリカにおける近代的都市計画の理念を体現した最初の優れた事例である。", "region": "Latin America and the Caribbean"},
{"id": 915, "name": "エルツ山地／クルシュネー・ホリ鉱業地域", "nameEn": "Erzgebirge/Krušnohoří Mining Region", "country": "ドイツ/チェコ", "lat": 50.4065277778, "lng": 12.8373444444, "era": "中世〜近現代", "criteria": "(ii)(iii)(iv)", "desc": "12〜20世紀の約800年にわたり銀・錫・ウランなどの採掘が行われた鉱業景観。1460〜1560年にはヨーロッパ最大の銀鉱地帯として技術革新を牽引した。", "region": "Europe and North America"},
{"id": 916, "name": "チェスキー・クルムロフ歴史地区", "nameEn": "Historic Centre of Český Krumlov", "country": "チェコ", "lat": 48.8106944444, "lng": 14.3150277778, "era": "中世〜近世", "criteria": "(iv)", "desc": "ヴルタヴァ川沿いに13世紀の城を核として発展した中欧の小都市。ゴシック・ルネサンス・バロックの建築が5世紀以上にわたりほぼ無傷で残る。", "region": "Europe and North America"},
{"id": 917, "name": "クロムニェジーシュの庭園と城", "nameEn": "Gardens and Castle at Kroměříž", "country": "チェコ", "lat": 49.3, "lng": 17.37722222, "era": "近世", "criteria": "(ii)(iv)", "desc": "モラヴァ川沿いに位置するバロック期の大司教の居城と庭園。ヨーロッパのバロック式宮殿庭園として非常に完全な保存状態を誇る優れた遺産である。", "region": "Europe and North America"},
{"id": 918, "name": "テルチ歴史地区", "nameEn": "Historic Centre of Telč", "country": "チェコ", "lat": 49.1841388889, "lng": 15.4539722222, "era": "中世〜近世", "criteria": "(i)(iv)", "desc": "14世紀末の火災後に石造で再建された丘上の町。ルネサンス・バロック様式のファサードが統一的に並ぶ広場は、中欧小都市建築の傑出した事例である。", "region": "Europe and North America"},
{"id": 919, "name": "プラハ歴史地区", "nameEn": "Historic Centre of Prague", "country": "チェコ", "lat": 50.08972, "lng": 14.41944, "era": "中世〜近世", "criteria": "(ii)(iv)", "desc": "11〜18世紀に建設された旧市街・小地区・新市街からなる歴史都市。カレル4世治世下の14世紀に建てられたフラチャニ城・聖ヴィート大聖堂・カレル橋が象徴的。", "region": "Europe and North America"},
{"id": 920, "name": "クラドルビー・ナト・ラベムの儀式用馬車馬の繁殖・調教の景観", "nameEn": "Landscape for Breeding and Training of Ceremonial Carriage Horses at Kladruby nad Labem", "country": "チェコ", "lat": 50.05665, "lng": 15.4842583333, "era": "近世", "criteria": "(iv)(v)", "desc": "1579年創設のハプスブルク家御用牧場。クラドルバー種の儀式用馬車馬の繁殖・訓練に特化した文化的景観で、仏英式庭園設計と牧場機能が融合する。", "region": "Europe and North America"},
{"id": 921, "name": "リトミシュル城", "nameEn": "Litomyšl Castle", "country": "チェコ", "lat": 49.87361, "lng": 16.31444, "era": "近世", "criteria": "(ii)(iv)", "desc": "16世紀にイタリアから中欧に伝わったルネサンス・アーケード城館の傑出した例。18世紀のバロック装飾を含め、貴族の邸宅としての付属施設群がそのまま残る。", "region": "Europe and North America"},
{"id": 922, "name": "ブルノのトゥーゲントハット邸", "nameEn": "Tugendhat Villa in Brno", "country": "チェコ", "lat": 49.2071833333, "lng": 16.6160555556, "era": "近現代", "criteria": "(ii)(iv)", "desc": "ミース・ファン・デル・ローエが設計し1930年に完成した邸宅。1920年代ヨーロッパの国際様式を代表する近代建築で、革新的な空間・美学概念を具現化した。", "region": "Europe and North America"},
{"id": 923, "name": "金剛山—海からのダイヤモンド・マウンテン", "nameEn": "Mount Kumgang – Diamond Mountain from the Sea", "country": "北朝鮮", "lat": 38.6602777778, "lng": 128.1375, "era": "古代〜中世", "criteria": "(iii)(vii)", "desc": "標高約1600mの白い花崗岩峰と深い谷・滝が織りなす景勝地。5世紀以来の山岳仏教の聖地であり、庵・寺院・仏塔・石刻が自然景観と一体をなす複合遺産。", "region": "Asia and the Pacific"},
{"id": 924, "name": "開城の歴史的建造物群と遺跡群", "nameEn": "Historic Monuments and Sites in Kaesong", "country": "北朝鮮", "lat": 37.9816666667, "lng": 126.5080555556, "era": "中世", "criteria": "(ii)(iii)", "desc": "10〜14世紀の高麗王朝の旧都に残る12の構成資産。宮殿・王陵・天文台・成均館など、仏教から朱子学への移行期の政治・文化・思想的価値を体現する。", "region": "Asia and the Pacific"},
{"id": 925, "name": "サロンガ国立公園", "nameEn": "Salonga National Park", "country": "コンゴ民主共和国", "lat": -2.0, "lng": 21.0, "era": "自然遺産", "criteria": "(vii)(ix)", "desc": "コンゴ川中央流域に位置するアフリカ最大の熱帯雨林保護区。水路でしか到達できない孤立した環境に、ボノボやコンゴクジャクなど固有絶滅危惧種が生息する。", "region": "Africa"},
{"id": 926, "name": "オカピ野生生物保護区", "nameEn": "Okapi Wildlife Reserve", "country": "コンゴ民主共和国", "lat": 2.0, "lng": 28.5, "era": "自然遺産", "criteria": "(x)", "desc": "イトゥリの森の約5分の1を占め、野生オカピ約5000頭が生息する保護区。ムブティ族ピグミーの伝統的な狩猟地でもあるが、危機遺産に登録されている。", "region": "Africa"},
{"id": 927, "name": "ガランバ国立公園", "nameEn": "Garamba National Park", "country": "コンゴ民主共和国", "lat": 4.0, "lng": 29.25, "era": "自然遺産", "criteria": "(vii)(x)", "desc": "サバンナと河畔林にゾウ・キリン・カバ・シロサイが生息する国立公園。特にキタシロサイの最後の生息地として重要だが、密猟により危機遺産に登録されている。", "region": "Africa"},
{"id": 928, "name": "クヤータ・グリーンランド：氷帽末端のノース人とイヌイットの農業", "nameEn": "Kujataa Greenland: Norse and Inuit Farming at the Edge of the Ice Cap", "country": "デンマーク", "lat": 61.1644444444, "lng": -45.5980555556, "era": "中世", "criteria": "(v)", "desc": "グリーンランド南部の亜寒帯農業景観。10世紀にアイスランドから来たノース人と18世紀末のイヌイットの二つの文化が、北極圏初の農耕をもたらした証である。", "region": "Europe and North America"},
{"id": 929, "name": "アアシヴィスイト—ニピサット：氷と海の間のイヌイット狩猟場", "nameEn": "Aasivissuit – Nipisat. Inuit Hunting Ground between Ice and Sea", "country": "デンマーク", "lat": 67.0639305556, "lng": -51.4332055556, "era": "先史", "criteria": "(v)", "desc": "西グリーンランドの北極圏内に4200年にわたる人類の痕跡が残る文化的景観。パレオ・イヌイットからイヌイットまで季節移動の伝統と狩猟文化を伝える。", "region": "Europe and North America"},
{"id": 930, "name": "イェリング墳墓群、ルーン文字石碑と教会", "nameEn": "Jelling Mounds, Runic Stones and Church", "country": "デンマーク", "lat": 55.75638889, "lng": 9.42, "era": "中世", "criteria": "(iii)", "desc": "10世紀中頃のデンマークのキリスト教化を示す遺跡群。2基の墳丘とルーン石碑が北欧の異教文化からキリスト教への転換を物語る「デンマーク誕生の地」。", "region": "Europe and North America"},
{"id": 931, "name": "メンス・クリント", "nameEn": "Møns Klint", "country": "デンマーク", "lat": 54.9677777778, "lng": 12.5502777778, "era": "自然遺産", "criteria": "(viii)", "desc": "更新世の氷河が形成した壮大な氷河構造地形。白亜紀のチョーク断崖が褶曲・断層を露出させ、石灰質草地やブナ林にラン18種やオオルリシジミが生息する。", "region": "Europe and North America"},
{"id": 932, "name": "サンタ・アナ・デ・ロス・リオス・デ・クエンカの歴史地区", "nameEn": "Historic Centre of Santa Ana de los Ríos de Cuenca", "country": "エクアドル", "lat": -2.897447, "lng": -79.004382, "era": "近世", "criteria": "(ii)(iv)(v)", "desc": "1557年にカルロス5世の都市計画指針に基づき建設されたアンデスの植民都市。400年守られた格子状街路と18〜19世紀の建築が調和した町並みが残る。", "region": "Latin America and the Caribbean"},
{"id": 933, "name": "聖カタリナ地域", "nameEn": "Saint Catherine Area", "country": "エジプト", "lat": 28.55623, "lng": 33.97543, "era": "古代〜中世", "criteria": "(i)(iii)(iv)", "desc": "モーセが十戒を授かったとされるシナイ山の麓に6世紀に創建された、現在も使用される世界最古の修道院。キリスト教・イスラム教・ユダヤ教の三宗教の聖地である。", "region": "Arab States"},
{"id": 934, "name": "ホヤ・デ・セレンの考古遺跡", "nameEn": "Joya de Cerén Archaeological Site", "country": "エルサルバドル", "lat": 13.8275, "lng": -89.36916667, "era": "古代", "criteria": "(iii)(iv)", "desc": "600年頃の火山噴火で埋没した先ヒスパニック期の農村集落。「中米のポンペイ」と呼ばれ、当時のマヤ周辺住民の日常生活を例外的な保存状態で伝える。", "region": "Latin America and the Caribbean"},
{"id": 935, "name": "アスマラ：アフリカのモダニズム都市", "nameEn": "Asmara: A Modernist African City", "country": "エリトリア", "lat": 15.3352777778, "lng": 38.9358333333, "era": "近現代", "criteria": "(ii)(iv)", "desc": "標高2000m以上に位置するエリトリアの首都。1893〜1941年にイタリア植民地時代の合理主義建築が集中的に建設され、アフリカにおける初期モダニズム都市計画の傑出した例。", "region": "Africa"},
{"id": 936, "name": "オモ川下流域", "nameEn": "Lower Valley of the Omo", "country": "エチオピア", "lat": 4.8, "lng": 35.96666667, "era": "先史", "criteria": "(iii)(iv)", "desc": "トゥルカナ湖近くの先史時代遺跡。ホモ属の化石が多数発見され、人類進化の研究に根本的な重要性を持つ世界的に著名な古人類学の拠点である。", "region": "Africa"},
{"id": 937, "name": "ラリベラの岩窟教会群", "nameEn": "Rock-Hewn Churches, Lalibela", "country": "エチオピア", "lat": 12.02935, "lng": 39.04042, "era": "中世", "criteria": "(i)(ii)(iii)", "desc": "13世紀に「新エルサレム」として岩盤を掘り抜いて造られた11のモノリシック教会群。エチオピア正教の聖地として今なお巡礼者が絶えない信仰の場である。", "region": "Africa"},
{"id": 938, "name": "サン＝サヴァン・シュル・ガルタンプ修道院教会", "nameEn": "Abbey Church of Saint-Savin sur Gartempe", "country": "フランス", "lat": 46.56472, "lng": 0.86611, "era": "中世", "criteria": "(i)(iii)", "desc": "「ロマネスクのシスティーナ礼拝堂」と称される修道院教会。11〜12世紀の壁画が驚くべき保存状態で残り、フランス・ロマネスク絵画の最高傑作とされる。", "region": "Europe and North America"},
{"id": 939, "name": "ペタヤヴェシの古い教会", "nameEn": "Petäjävesi Old Church", "country": "フィンランド", "lat": 62.25, "lng": 25.18333, "era": "近世", "criteria": "(iv)", "desc": "1763〜65年に丸太で建設された中部フィンランドのルーテル派教会。ルネサンスの集中式平面とゴシックの交差ヴォールトを融合した東スカンジナビア独自の建築伝統を示す。", "region": "Europe and North America"},
{"id": 940, "name": "ヴェルラ砕木・板紙工場", "nameEn": "Verla Groundwood and Board Mill", "country": "フィンランド", "lat": 61.06194, "lng": 26.64083, "era": "近現代", "criteria": "(iv)", "desc": "19〜20世紀初頭に北欧で栄えたパルプ・製紙産業の小規模農村工場集落の優れた遺例。工場と労働者住宅が一体として非常に良好な保存状態で残る。", "region": "Europe and North America"},
{"id": 941, "name": "ブールジュ大聖堂", "nameEn": "Bourges Cathedral", "country": "フランス", "lat": 47.08222222, "lng": 2.398333333, "era": "中世", "criteria": "(i)(iv)", "desc": "12世紀末〜13世紀末に建設されたゴシック建築の傑作。二重側廊の均整のとれたプロポーションとステンドグラスが見事で、中世フランスの信仰の力を証する。", "region": "Europe and North America"},
{"id": 942, "name": "シェヌ・デ・ピュイ—リマーニュ断層の地殻変動地域", "nameEn": "Chaîne des Puys - Limagne fault tectonic arena", "country": "フランス", "lat": 45.7793888889, "lng": 2.9651111111, "era": "自然遺産", "criteria": "(viii)", "desc": "フランス中部に位置する西欧リフトの象徴的区間。約3500万年前のアルプス形成に伴い生じたリマーニュ断層と連なる火山群が、大陸地殻の裂開過程を明示する。", "region": "Europe and North America"},
{"id": 943, "name": "ボルドー・月の港", "nameEn": "Bordeaux, Port of the Moon", "country": "フランス", "lat": 44.8388888889, "lng": -0.5722222222, "era": "近世", "criteria": "(ii)(iv)", "desc": "啓蒙時代に整備された南西フランスの港湾都市。18世紀の古典主義・新古典主義の都市計画がパリに次ぐ数の保護建造物を生み出し、卓越した都市的統一性を持つ。", "region": "Europe and North America"},
{"id": 944, "name": "シャンパーニュの丘陵、メゾンとカーヴ", "nameEn": "Champagne Hillsides, Houses and Cellars", "country": "フランス", "lat": 49.0775, "lng": 3.9461111111, "era": "近世", "criteria": "(iii)(iv)", "desc": "17世紀初頭から発展したシャンパン製造法を伝える文化的景観。歴史的ブドウ畑・地下貯蔵庫・シャンパンメゾンが生産から販売までの全工程を示す。", "region": "Europe and North America"},
{"id": 945, "name": "フランス領南方地域の陸地と海域", "nameEn": "French Austral Lands and Seas", "country": "フランス", "lat": -49.3803611111, "lng": 69.3528055556, "era": "自然遺産", "criteria": "(vii)(ix)(x)", "desc": "南インド洋のクローゼ諸島・ケルゲレン諸島等を含む1億6600万ha以上の保護区。世界最大のオウサマペンギン個体群やキバナアホウドリが生息する海鳥の楽園である。", "region": "Europe and North America"},
{"id": 946, "name": "ヴォーバンの防衛施設群", "nameEn": "Fortifications of Vauban", "country": "フランス", "lat": 47.2361111111, "lng": 6.0269444444, "era": "近世", "criteria": "(i)(ii)(iv)", "desc": "ルイ14世の軍事技師ヴォーバン（1633〜1707年）が設計した12の要塞群。フランス国境沿いに築かれた古典的築城術の最高峰であり、19世紀まで世界の要塞建築に影響を与えた。", "region": "Europe and North America"},
{"id": 947, "name": "ニューカレドニアのラグーン：サンゴ礁の多様性と関連する生態系", "nameEn": "Lagoons of New Caledonia: Reef Diversity and Associated Ecosystems", "country": "フランス", "lat": -20.4119444444, "lng": 164.5663888889, "era": "自然遺産", "criteria": "(vii)(ix)(x)", "desc": "世界三大サンゴ礁系の一つであるニューカレドニアの6つの海洋クラスター。世界最多級のサンゴ礁構造の多様性を持ち、ジュゴンの世界第3位の個体群が生息する。", "region": "Europe and North America"},
{"id": 948, "name": "サン＝テミリオン地域", "nameEn": "Jurisdiction of Saint-Emilion", "country": "フランス", "lat": 44.89472222, "lng": -0.1552777778, "era": "中世", "criteria": "(iii)(iv)", "desc": "ローマ時代に始まるブドウ栽培が中世に発展したアキテーヌ地方のワイン産地。サンティアゴ巡礼路沿いに11世紀以降の教会や修道院が建てられた文化的景観である。", "region": "Europe and North America"},
{"id": 949, "name": "ル・アーヴル、オーギュスト・ペレによる再建都市", "nameEn": "Le Havre, the City Rebuilt by Auguste Perret", "country": "フランス", "lat": 49.49278, "lng": 0.1075, "era": "近現代", "criteria": "(ii)(iv)", "desc": "第二次大戦で壊滅したノルマンディーの港湾都市を、建築家オーギュスト・ペレが1945〜64年にコンクリートで再建。モデュール・グリッドに基づく戦後都市計画の傑作。", "region": "Europe and North America"},
{"id": 950, "name": "ヴェルサイユの宮殿と庭園", "nameEn": "Palace and Park of Versailles", "country": "フランス", "lat": 48.805, "lng": 2.119444444, "era": "近世", "criteria": "(i)(ii)", "desc": "ルイ14世からルイ16世まで歴代フランス王の主要居城。壮麗なバロック宮殿と幾何学式庭園は1世紀以上にわたりヨーロッパの王宮建築の模範となった。", "region": "Europe and North America"},
{"id": 951, "name": "パリのセーヌ河岸", "nameEn": "Paris, Banks of the Seine", "country": "フランス", "lat": 48.8655, "lng": 2.3211388889, "era": "中世〜近現代", "criteria": "(i)(ii)(iv)", "desc": "ルーヴルからエッフェル塔まで、セーヌ川沿いにパリの歴史が凝縮された都市景観。ノートルダム大聖堂やオスマンの大通りなど世界の都市計画に影響を与えた。", "region": "Europe and North America"},
{"id": 952, "name": "オランジュのローマ劇場とその周辺及び凱旋門", "nameEn": "Roman Theatre and its Surroundings and the Triumphal Arch of Orange", "country": "フランス", "lat": 44.13572222, "lng": 4.808416667, "era": "古代", "criteria": "(iii)", "desc": "ローヌ渓谷に位置するローマ時代の劇場と凱旋門。舞台背面の壁（幅103m）が最も良好に保存されたローマ劇場の一つで、アウグストゥス期の凱旋門も残る。", "region": "Europe and North America"},
{"id": 953, "name": "ニームのメゾン・カレ", "nameEn": "The Maison Carrée of Nîmes", "country": "フランス", "lat": 43.8382222222, "lng": 4.3561944444, "era": "古代", "criteria": "(iv)", "desc": "1世紀にローマ植民都市ネマウススに建てられた神殿。アウグストゥスの後継者に捧げられ、属州における皇帝崇拝の最も初期のローマ神殿建築を伝える傑作。", "region": "Europe and North America"},
{"id": 954, "name": "クンタ・キンテ島と関連遺跡群", "nameEn": "Kunta Kinteh Island and Related Sites", "country": "ガンビア", "lat": 13.31616667, "lng": -16.35719444, "era": "近世", "criteria": "(iii)", "desc": "ガンビア川沿いにアフリカとヨーロッパの交流史を伝える遺跡群。奴隷貿易の開始と廃止に深く関わり、植民地以前から独立に至る歴史の証言である。", "region": "Africa"},
{"id": 955, "name": "アーヘン大聖堂", "nameEn": "Aachen Cathedral", "country": "ドイツ", "lat": 50.7747468537, "lng": 6.083919968, "era": "中世", "criteria": "(i)(ii)(iv)", "desc": "790〜800年頃にカール大帝の命で建設された八角形の宮廷礼拝堂。世界遺産第1号の一つで、東ローマの教会に着想を得た中世ヨーロッパ建築の先駆的傑作。", "region": "Europe and North America"},
{"id": 956, "name": "ムツヘタの歴史的建造物群", "nameEn": "Historical Monuments of Mtskheta", "country": "ジョージア", "lat": 41.8422777778, "lng": 44.7210277778, "era": "中世", "criteria": "(iii)(iv)", "desc": "ジョージア旧首都ムツヘタに残るコーカサス地方の中世宗教建築の傑作群。スヴェティツホヴェリ大聖堂やジュワリ修道院が古代王国の高い芸術水準を示す。", "region": "Europe and North America"},
{"id": 957, "name": "コルヴァイのカロリング朝ヴェストヴェルクとキウィタス", "nameEn": "Carolingian Westwork and Civitas Corvey", "country": "ドイツ", "lat": 51.7782777778, "lng": 9.41025, "era": "中世", "criteria": "(ii)(iii)(iv)", "desc": "822〜885年に建設された帝国修道院。現存する唯一のカロリング朝ヴェストヴェルク（西構え）で、フランク帝国の領土統治とキリスト教布教を象徴する。", "region": "Europe and North America"},
{"id": 958, "name": "ブリュールのアウグストゥスブルク城と別邸ファルケンルスト", "nameEn": "Castles of Augustusburg and Falkenlust at Brühl", "country": "ドイツ", "lat": 50.82502778, "lng": 6.909777778, "era": "近世", "criteria": "(ii)(iv)", "desc": "ケルン大司教の豪華な居城と狩猟別邸。庭園に囲まれた18世紀ドイツ最初期のロココ建築の傑出した例で、バルタザール・ノイマンによる階段室が名高い。", "region": "Europe and North America"},
{"id": 959, "name": "ローマ帝国の国境線—低地ゲルマニアのリメス", "nameEn": "Frontiers of the Roman Empire – The Lower German Limes", "country": "オランダ/ドイツ", "lat": 52.1803333333, "lng": 4.433, "era": "古代", "criteria": "(ii)(iii)(iv)", "desc": "ライン川下流域に約400kmにわたるローマ帝国の辺境防衛線。1〜5世紀の軍事・民間遺跡102か所が地下に良好に保存されている越境遺産である。", "region": "Europe and North America"},
{"id": 960, "name": "ハンザ同盟都市リューベック", "nameEn": "Hanseatic City of Lübeck", "country": "ドイツ", "lat": 53.86667, "lng": 10.69167, "era": "中世", "criteria": "(iv)", "desc": "12世紀に建設されハンザ同盟の盟主として北欧交易の中心となった都市。煉瓦造りのホルステン門や15〜16世紀の貴族邸宅・塩倉庫が旧市街に残る。", "region": "Europe and North America"},
{"id": 961, "name": "ダルムシュタットのマティルデンヘーエ", "nameEn": "Mathildenhöhe Darmstadt", "country": "ドイツ", "lat": 49.8763888889, "lng": 8.6675, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1897年にヘッセン大公が設立した芸術家コロニー。1901〜14年の国際展で拡張され、アーツ&クラフツ運動やウィーン分離派の影響を受けた初期モダニズム建築の証。", "region": "Europe and North America"},
{"id": 962, "name": "アイスレーベンとヴィッテンベルクのルター記念建造物群", "nameEn": "Luther Memorials in Eisleben and Wittenberg", "country": "ドイツ", "lat": 51.86472, "lng": 12.65278, "era": "中世〜近世", "criteria": "(iv)", "desc": "マルティン・ルターの生家・終焉の家、1517年に「95か条の論題」を掲示した城教会など。宗教改革を起こし西洋世界の歴史を変えた場所群である。", "region": "Europe and North America"},
{"id": 963, "name": "マウルブロン修道院の建造物群", "nameEn": "Maulbronn Monastery Complex", "country": "ドイツ", "lat": 49.00083, "lng": 8.81306, "era": "中世", "criteria": "(ii)(iv)", "desc": "1147年創設のシトー会修道院で、アルプス以北で最も完全に保存された中世修道院複合体。過渡期ゴシック様式の教会と精巧な水管理システムが特筆される。", "region": "Europe and North America"},
{"id": 964, "name": "ランメルスベルク鉱山、ゴスラーの歴史都市と上ハルツの水利管理システム", "nameEn": "Mines of Rammelsberg, Historic Town of Goslar and Upper Harz Water Management System", "country": "ドイツ", "lat": 51.82, "lng": 10.34, "era": "中世〜近現代", "criteria": "(i)(ii)(iii)(iv)", "desc": "約800年にわたり発展した鉱山と水利管理の複合遺産。中世のシトー会修道士に始まり、人工池・水路・坑道からなる精緻な水力システムが鉱業技術革新を支えた。", "region": "Europe and North America"},
{"id": 965, "name": "レーゲンスブルク旧市街とシュタットアムホーフ", "nameEn": "Old town of Regensburg with Stadtamhof", "country": "ドイツ", "lat": 49.02055556, "lng": 12.09916667, "era": "中世", "criteria": "(ii)(iii)(iv)", "desc": "ドナウ川沿いの中世交易都市。11〜13世紀のロマネスク・ゴシック建築と12世紀の石橋が2000年の歴史を伝え、神聖ローマ帝国の重要拠点であった。", "region": "Europe and North America"},
{"id": 966, "name": "ムスカウアー公園／ムジャクフ公園", "nameEn": "Muskauer Park / Park Mużakowski", "country": "ポーランド/ドイツ", "lat": 51.547653, "lng": 14.729389, "era": "近現代", "criteria": "(i)(iv)", "desc": "1815〜44年にプュックラー＝ムスカウ侯が創造したナイセ川をまたぐ約560haの風景式庭園。「植物で描く絵画」として欧米の景観設計に革新的影響を与えた。", "region": "Europe and North America"},
{"id": 967, "name": "カーカティーヤ朝のルドレーシュワラ（ラマッパ）寺院、テランガーナ州", "nameEn": "Kakatiya Rudreshwara (Ramappa) Temple, Telangana", "country": "インド", "lat": 18.2591333333, "lng": 79.9432055556, "era": "中世", "criteria": "(i)(iii)", "desc": "1213年に建設が始まったカーカティーヤ朝のシヴァ寺院。屋根に「浮くレンガ」と呼ばれる軽量多孔質煉瓦を使用した独創的な構造と精緻な彫刻が特徴的である。", "region": "Asia and the Pacific"},
{"id": 968, "name": "シュペイアー、ヴォルムス、マインツのシュム遺跡群", "nameEn": "ShUM Sites of Speyer, Worms and Mainz", "country": "ドイツ", "lat": 49.3162111111, "lng": 8.4395388889, "era": "中世", "criteria": "(ii)(iii)", "desc": "11〜14世紀に形成されたアシュケナジム・ユダヤ文化の揺籃地。シナゴーグ・ミクヴェ（儀式浴場）・墓地が後のヨーロッパのユダヤ共同体建築の原型となった。", "region": "Europe and North America"},
{"id": 969, "name": "ライン渓谷中流上部", "nameEn": "Upper Middle Rhine Valley", "country": "ドイツ", "lat": 50.17361111, "lng": 7.694166667, "era": "中世〜近世", "criteria": "(ii)(iv)(v)", "desc": "65kmにわたるライン川中流域の文化的景観。40以上の古城・歴史的町並み・ブドウ畑が、伝説とともに何世紀にもわたり文学者・芸術家に霊感を与えてきた。", "region": "Europe and North America"},
{"id": 970, "name": "ブレーメンのマルクト広場の市庁舎とローラント像", "nameEn": "Town Hall and Roland on the Marketplace of Bremen", "country": "ドイツ", "lat": 53.07597222, "lng": 8.807472222, "era": "中世〜近世", "criteria": "(iii)(iv)", "desc": "15世紀初頭にゴシック様式で建てられた市庁舎と1404年のローラント像。神聖ローマ帝国における市民の自治と自由の象徴として市場広場に立つ。", "region": "Europe and North America"},
{"id": 971, "name": "アウクスブルクの水管理システム", "nameEn": "Water Management System of Augsburg", "country": "ドイツ", "lat": 48.3654722222, "lng": 10.902, "era": "中世〜近現代", "criteria": "(ii)(iv)", "desc": "14世紀から現在まで発展した都市水管理システム。15〜17世紀の給水塔・3つの記念碑的噴水・水力発電所を含み、水利工学の先駆都市としての革新性を示す。", "region": "Europe and North America"},
{"id": 972, "name": "フェルクリンゲン製鉄所", "nameEn": "Völklingen Ironworks", "country": "ドイツ", "lat": 49.2487222222, "lng": 6.8442222222, "era": "近現代", "criteria": "(ii)(iv)", "desc": "約6haに広がる19〜20世紀の一貫製鉄所。西欧・北米で唯一完全に保存された統合型製鉄施設で、鉄鋼業の産業遺産として価値が認められた。", "region": "Europe and North America"},
{"id": 973, "name": "ヴュルツブルク司教館、その庭園群と広場", "nameEn": "Würzburg Residence with the Court Gardens and Residence Square", "country": "ドイツ", "lat": 49.79278, "lng": 9.93889, "era": "近世", "criteria": "(i)(iv)", "desc": "18世紀にバルタザール・ノイマン指揮の国際チームが建設した壮大なバロック宮殿。ティエポロの天井画を擁する階段室はドイツ最大・最美級の宮殿建築である。", "region": "Europe and North America"},
{"id": 974, "name": "ヴォルタ州、グレーター・アクラ州、中部州、西部州の城塞群", "nameEn": "Forts and Castles, Volta, Greater Accra, Central and Western Regions", "country": "ガーナ", "lat": 5.39103, "lng": -0.49361, "era": "近世", "criteria": "", "desc": "1482〜1786年にガーナ海岸沿いに築かれた要塞化された交易拠点群。ポルトガルに始まる大航海時代の交易路を構成し、奴隷貿易の歴史も伝える。", "region": "Africa"},
{"id": 975, "name": "デロス島", "nameEn": "Delos", "country": "ギリシャ", "lat": 37.4, "lng": 25.26667, "era": "古代", "criteria": "(ii)(iii)(iv)", "desc": "ギリシア神話でアポロン誕生の地とされるキクラデス諸島の小島。紀元前3千年紀から初期キリスト教期に至るエーゲ海文明の痕跡が残る国際的な交易港であった。", "region": "Europe and North America"},
{"id": 976, "name": "フィリッピの考古遺跡", "nameEn": "Archaeological Site of Philippi", "country": "ギリシャ", "lat": 41.0147222222, "lng": 24.2852777778, "era": "古代", "criteria": "(iii)(iv)", "desc": "紀元前356年にマケドニア王フィリッポス2世が建設した城塞都市。ヴィア・エグナティア沿いに発展し、使徒パウロの訪問後は初期キリスト教の中心地となった。", "region": "Europe and North America"},
{"id": 977, "name": "アトス山", "nameEn": "Mount Athos", "country": "ギリシャ", "lat": 40.26667, "lng": 24.21667, "era": "中世", "criteria": "(i)(ii)(iv)(v)(vii)", "desc": "1054年以来の正教会の精神的中心地。ビザンツ時代から自治権を持つ「聖なる山」に約20の修道院が現存し、約1400人の修道士が暮らす複合遺産である。", "region": "Europe and North America"},
{"id": 978, "name": "サモス島のピタゴリオンとヘーラー神殿", "nameEn": "Pythagoreion and Heraion of Samos", "country": "ギリシャ", "lat": 37.69083, "lng": 26.94333, "era": "古代", "criteria": "(ii)(iii)", "desc": "小アジア近くのエーゲ海の島に残る古代ギリシアの要塞港ピタゴリオンとヘーラー神殿。壮大なトンネル式水道橋がギリシア技術の高さを物語る。", "region": "Europe and North America"},
{"id": 979, "name": "バッサイのアポロ・エピクリオス神殿", "nameEn": "Temple of Apollo Epicurius at Bassae", "country": "ギリシャ", "lat": 37.43498, "lng": 21.89694, "era": "古代", "criteria": "(i)(ii)(iii)", "desc": "紀元前5世紀半ばにアルカディアの山中に建てられた太陽と治癒の神アポロンの神殿。現存最古のコリント式柱頭を持ち、ドリス・イオニア・コリント三様式が共存する。", "region": "Europe and North America"},
{"id": 980, "name": "キリグアの考古公園と遺跡群", "nameEn": "Archaeological Park and Ruins of Quirigua", "country": "グアテマラ", "lat": 15.27059, "lng": -89.04025, "era": "古代", "criteria": "(i)(ii)(iv)", "desc": "8世紀のカワク・スカイ王治世に繁栄したマヤ文明の都市国家遺跡。精巧な彫刻石碑と暦の碑文群がマヤ文明研究の不可欠な史料として高く評価される。", "region": "Latin America and the Caribbean"},
{"id": 981, "name": "パトモス島の歴史地区（ホーラ）と神学者聖ヨハネ修道院、黙示録の洞窟", "nameEn": "The Historic Centre (Chorá) with the Monastery of Saint-John the Theologian and the Cave of the Apocalypse on the Island of Pátmos", "country": "ギリシャ", "lat": 37.3, "lng": 26.55, "era": "中世", "criteria": "(iii)(iv)", "desc": "聖ヨハネが福音書と黙示録を著したとされるドデカネス諸島の小島。10世紀末創設の修道院が島を見下ろし、正教会の巡礼と学問の地として栄える。", "region": "Europe and North America"},
{"id": 982, "name": "ザゴリの文化的景観", "nameEn": "Zagori Cultural Landscape", "country": "ギリシャ", "lat": 39.9052777778, "lng": 20.8197222222, "era": "中世〜近世", "criteria": "(v)", "desc": "ピンドス山脈北部西斜面に点在するザゴロホリアの石造り集落群。石橋・石畳の道で結ばれた伝統的な山岳建築が、地域共同体の社会的紐帯を今に伝える。", "region": "Europe and North America"},
{"id": 983, "name": "ビジャゴス諸島の沿岸・海洋生態系—オマティ・ミニョ", "nameEn": "Coastal and Marine Ecosystems of the Bijagós Archipelago – Omatí Minhô", "country": "ギニアビサウ", "lat": 11.12, "lng": -15.9488888889, "era": "自然遺産", "criteria": "(ix)(x)", "desc": "アフリカ大西洋岸唯一の活発な三角州群島。マングローブ・干潟・潮間帯にアオウミガメやマナティーなど絶滅危惧種が生息し、87万羽以上の渡り鳥が飛来する。", "region": "Africa"},
{"id": 984, "name": "ティカル国立公園", "nameEn": "Tikal National Park", "country": "グアテマラ", "lat": 17.21666667, "lng": -89.61666667, "era": "古代", "criteria": "(i)(iii)(iv)(ix)(x)", "desc": "紀元前6世紀〜紀元後10世紀に栄えたマヤ文明の主要都市遺跡。密林の中に壮大な神殿ピラミッドや宮殿が林立し、熱帯雨林の豊かな生態系とともに保護される複合遺産。", "region": "Latin America and the Caribbean"},
{"id": 985, "name": "リオ・プラタノ生物圏保護区", "nameEn": "Río Plátano Biosphere Reserve", "country": "ホンジュラス", "lat": 15.74444444, "lng": -84.675, "era": "自然遺産", "criteria": "(vii)(viii)(ix)(x)", "desc": "中米に残る数少ない熱帯雨林の一つ。山地からカリブ海岸へ至る多様な環境に2000人以上の先住民が伝統的生活を営むが、危機遺産に登録されている。", "region": "Latin America and the Caribbean"},
{"id": 986, "name": "パンノンハルマの千年の歴史を持つベネディクト会修道院とその自然環境", "nameEn": "Millenary Benedictine Abbey of Pannonhalma and its Natural Environment", "country": "ハンガリー", "lat": 47.55889, "lng": 17.78444, "era": "中世", "criteria": "(iv)", "desc": "996年にベネディクト会修道士が定住し、ハンガリー人の改宗と国内初の学校設立を果たした修道院。1000年の歴史を持つ建築群が今も修道生活を支える。", "region": "Europe and North America"},
{"id": 987, "name": "シンクヴェトリル国立公園", "nameEn": "Þingvellir National Park", "country": "アイスランド", "lat": 64.25380556, "lng": -21.03725, "era": "中世", "criteria": "(iii)", "desc": "930年に設立されたアイスランドの全島民議会アルシングの開催地。1798年まで野外で法律制定と紛争解決を行った、世界最古級の議会制度の歴史的象徴。", "region": "Europe and North America"},
{"id": 988, "name": "チャーンパーネール＝パーヴァーガド遺跡公園", "nameEn": "Champaner-Pavagadh Archaeological Park", "country": "インド", "lat": 22.48333333, "lng": 73.53333333, "era": "中世〜近世", "criteria": "(iii)(iv)(v)", "desc": "先史時代の銅石器文化から16世紀のグジャラート州都の遺構までが集中する考古公園。ムガル以前のイスラム都市として唯一完全に残る貴重な遺跡である。", "region": "Asia and the Pacific"},
{"id": 989, "name": "チャトラパティ・シヴァージー・ターミナス駅（旧ヴィクトリア・ターミナス）", "nameEn": "Chhatrapati Shivaji Terminus (formerly Victoria Terminus)", "country": "インド", "lat": 18.9401222222, "lng": 72.8362027777, "era": "近現代", "criteria": "(ii)(iv)", "desc": "1878年から10年かけて建設されたムンバイの壮大な鉄道駅。ヴィクトリア朝ゴシック・リヴァイヴァル様式とインド伝統建築が融合した、二文化交流の傑出した象徴。", "region": "Asia and the Pacific"},
{"id": 990, "name": "エローラ石窟群", "nameEn": "Ellora Caves", "country": "インド", "lat": 20.02639, "lng": 75.17917, "era": "古代〜中世", "criteria": "(i)(iii)", "desc": "600〜1000年に玄武岩の断崖に掘られた34の僧院・寺院群。仏教・ヒンドゥー教・ジャイナ教の三宗教の聖所が共存し、古代インドの寛容の精神を体現する。", "region": "Asia and the Pacific"},
{"id": 991, "name": "パッタダカルの建造物群", "nameEn": "Group of Monuments at Pattadakal", "country": "インド", "lat": 15.94833, "lng": 75.81667, "era": "古代〜中世", "criteria": "(iii)(iv)", "desc": "7〜8世紀チャールキヤ朝の下で北インド・南インドの建築様式が融合した寺院群。740年頃に建てられたヴィルーパークシャ寺院が傑作として際立つ。", "region": "Asia and the Pacific"},

// ── Region filter (uses region field from data) ──
const REGIONS={
  '全地域':null,
  'ヨーロッパ・北米':'Europe and North America',
  'アジア・太平洋':'Asia and the Pacific',
  '中南米・カリブ':'Latin America and the Caribbean',
  'アフリカ':'Africa',
  'アラブ諸国':'Arab States',
  '日本':null, // special
};
function regionFilter(key){
  if(key==='全地域')return()=>true;
  if(key==='日本')return s=>s.country==='日本';
  const v=REGIONS[key];
  return s=>s.region===v;
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function calcScore(d){if(d<=50)return 1000;if(d>=10000)return 0;return Math.round(1000*Math.exp(-d/2000))}
function scoreToQuality(s){if(s>=900)return 5;if(s>=700)return 4;if(s>=400)return 3;if(s>=150)return 2;if(s>=50)return 1;return 0}
function getRank(s){
  if(s>=900)return{label:"完璧！",emoji:"🏆",color:"var(--gold)"};
  if(s>=700)return{label:"素晴らしい",emoji:"🌟",color:"var(--green)"};
  if(s>=400)return{label:"いい線",emoji:"👍",color:"var(--blue)"};
  if(s>=150)return{label:"惜しい",emoji:"🤔",color:"var(--purple)"};
  return{label:"復習しよう",emoji:"📚",color:"var(--red)"};
}

const SR_KEY="wh-quiz-sr-data";
let srData={},storageType="memory",isPrivateMode=false;

async function detectStorage(){
  try{localStorage.setItem("_t","1");if(localStorage.getItem("_t")==="1"){localStorage.removeItem("_t");storageType="localstorage";return}}catch(e){}
  storageType="memory";isPrivateMode=true;
}
async function loadSR(){
  await detectStorage();
  try{if(storageType==="localstorage"){const r=localStorage.getItem(SR_KEY);if(r)srData=JSON.parse(r)}
  if(window.storage){try{const r=await window.storage.get(SR_KEY);if(r)srData=JSON.parse(r.value)}catch(e){}}}catch(e){srData={}}
}
async function saveSR(){
  const j=JSON.stringify(srData);
  try{if(storageType==="localstorage")localStorage.setItem(SR_KEY,j)}catch(e){}
  try{if(window.storage)await window.storage.set(SR_KEY,j)}catch(e){}
}
function exportSRData(){const j=JSON.stringify(srData,null,2);const b=new Blob([j],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="wh-quiz-"+new Date().toISOString().slice(0,10)+".json";a.click();URL.revokeObjectURL(u)}
function importSRData(){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const t=await f.text();const d=JSON.parse(t);if(typeof d==="object"&&d!==null){srData=d;await saveSR();alert("復元しました（"+Object.keys(d).length+"件）")}}catch(err){alert("読み込み失敗")}};i.click()}
function resetSRData(){if(!confirm("学習データをすべてリセットしますか？"))return;srData={};saveSR();alert("リセット完了")}
function getSR(id){if(!srData[id])srData[id]={ef:2.5,interval:0,reps:0,nextReview:0,lastScore:0};return srData[id]}
function updateSR(id,score){
  const it=getSR(id),q=scoreToQuality(score);
  if(q>=3){if(it.reps===0)it.interval=1;else if(it.reps===1)it.interval=3;else it.interval=Math.round(it.interval*it.ef);it.reps++}else{it.reps=0;it.interval=1}
  it.ef=Math.max(1.3,it.ef+(0.1-(5-q)*(0.08+(5-q)*0.02)));it.nextReview=Date.now()+it.interval*86400000;it.lastScore=score;srData[id]=it;saveSR();
}
function selectSRQuestions(n,fn){
  const now=Date.now(),due=[],unseen=[],notDue=[];
  const pool=fn?SITES.filter(fn):SITES;
  pool.forEach(s=>{const sr=getSR(s.id);if(sr.reps===0&&sr.interval===0)unseen.push({site:s,sr,p:0});else if(sr.nextReview<=now)due.push({site:s,sr,p:1+1/(sr.ef||1)});else notDue.push({site:s,sr,p:0.1})});
  due.sort((a,b)=>b.p-a.p);shuffle(unseen);shuffle(notDue);
  return[...due,...unseen,...notDue].slice(0,n).map(p=>({...p.site,srStatus:p.sr.reps===0&&p.sr.interval===0?'new':p.sr.nextReview<=now?'review':'not-due'}));
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function ensureMap(){
  if(map&&!document.body.contains(map.getContainer())){try{map.remove()}catch(e){}map=null;tileLayer=null;guessMarker=null;answerMarker=null;line=null}
  if(map)return;const el=document.getElementById('map');if(!el)return;
  map=L.map(el,{center:[20,0],zoom:2,minZoom:2,maxZoom:12,zoomControl:false,attributionControl:false,worldCopyJump:true,fadeAnimation:false,markerZoomAnimation:false});
  tileLayer=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd',attribution:'© OSM © CARTO'}).addTo(map);
  L.control.zoom({position:'bottomright'}).addTo(map);
}
function clearOverlays(){
  if(guessMarker){map.removeLayer(guessMarker);guessMarker=null}
  if(answerMarker){map.removeLayer(answerMarker);answerMarker=null}
  if(line){map.removeLayer(line);line=null}
  map.off('click');
}
function resetMapView(){if(!map)return;clearOverlays();map.setView([20,0],2,{animate:false})}
function setState(p){Object.assign(state,p);render()}

async function startQuiz(){
  await loadSR();
  const fn=regionFilter(state.region);let qs;
  if(state.quizMode==='sr'){qs=selectSRQuestions(state.quizSize,fn)}
  else{let p=SITES.filter(fn);qs=shuffle([...p]).slice(0,state.quizSize).map(s=>({...s,srStatus:'free'}))}
  setState({mode:'playing',questions:qs,current:0,guessPos:null,showAnswer:false,scores:[],results:[]});
}
