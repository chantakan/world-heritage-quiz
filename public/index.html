    ensureMap();
    if(!state.showAnswer){resetMapView();map.on('click',onMapClick)}else showAnswerOnMap();
    map.invalidateSize({animate:false});
  });
  if(state.showAnswer)setTimeout(showResultOverlay,50);
  const cb=document.getElementById('confirmBtn');if(cb)cb.onclick=confirmGuess;
}

function onMapClick(e){
  if(state.showAnswer)return;
  state.guessPos=e.latlng;
  if(guessMarker)map.removeLayer(guessMarker);
  guessMarker=L.circleMarker([e.latlng.lat,e.latlng.lng],{radius:8,color:'#fff',weight:2,fillColor:'#dc2626',fillOpacity:1}).addTo(map);
  guessMarker.bindTooltip('予想',{permanent:true,direction:'top',offset:[0,-10]}).openTooltip();
  const ab=document.getElementById('actionBar');
  if(ab)ab.innerHTML='<button class="confirm-btn" id="confirmBtn">ここで決定！</button>';
  const cb=document.getElementById('confirmBtn');if(cb)cb.onclick=confirmGuess;
}

function showAnswerOnMap(){
  if(!map)return;clearOverlays();
  const s=state.questions[state.current],g=state.guessPos;
  if(g){guessMarker=L.circleMarker([g.lat,g.lng],{radius:8,color:'#fff',weight:2,fillColor:'#dc2626',fillOpacity:1}).addTo(map);guessMarker.bindTooltip('予想',{permanent:true,direction:'top',offset:[0,-10]}).openTooltip()}
  answerMarker=L.circleMarker([s.lat,s.lng],{radius:8,color:'#fff',weight:2,fillColor:'#059669',fillOpacity:1}).addTo(map);answerMarker.bindTooltip('正解',{permanent:true,direction:'top',offset:[0,-10]}).openTooltip();
  if(g){line=L.polyline([[g.lat,g.lng],[s.lat,s.lng]],{color:'#ef4444',weight:1.5,dashArray:'6,4',opacity:.7}).addTo(map);map.fitBounds(L.latLngBounds([[g.lat,g.lng],[s.lat,s.lng]]),{padding:[40,40],maxZoom:6})}
}

function confirmGuess(){
  if(!state.guessPos)return;
  const s=state.questions[state.current];
  const d=haversine(state.guessPos.lat,state.guessPos.lng,s.lat,s.lng);
  const sc=calcScore(d);
  state.scores.push(sc);state.results.push({site:s,guess:state.guessPos,dist:d,score:sc});
  if(state.quizMode==='sr')updateSR(s.id,sc);
  state.showAnswer=true;map.off('click');showAnswerOnMap();showResultOverlay();
  const ab=document.getElementById('actionBar');if(ab)ab.innerHTML='';
}

function showResultOverlay(){
  const r=state.results[state.results.length-1];if(!r)return;
  const rk=getRank(r.score),isLast=state.current+1>=state.questions.length;
  const ex=document.querySelector('.result-overlay');if(ex)ex.remove();
  const ov=document.createElement('div');ov.className='result-overlay';
  ov.innerHTML=`<div class="result-top"><div><div class="result-score"><span class="emoji">${rk.emoji}</span><span class="pts" style="color:${rk.color}">${r.score}pt</span></div><div class="result-meta">${r.site.country} · 距離 ${Math.round(r.dist).toLocaleString()}km<br>時代: ${r.site.era} · 登録基準: ${r.site.criteria}</div></div><button class="next-btn" id="nextBtn">${isLast?'結果を見る':'次へ →'}</button></div><div class="result-desc">${r.site.desc}</div>`;
  document.querySelector('.map-wrap').appendChild(ov);
  document.getElementById('nextBtn').onclick=nextQuestion;
}

function nextQuestion(){
  if(state.current+1>=state.questions.length){setState({mode:'summary'})}
  else{state.current++;state.guessPos=null;state.showAnswer=false;renderPlaying()}
}

function renderSummary(){
  if(map){map.remove();map=null;tileLayer=null}
  const ts=state.scores.reduce((a,b)=>a+b,0),avg=Math.round(ts/state.questions.length),rk=getRank(avg),mx=state.questions.length*1000;
  app.innerHTML=`
  <div class="summary">
    <div class="summary-header">
      <div class="emoji">${rk.emoji}</div><h2>${rk.label}</h2>
      <div class="summary-stats">
        <div class="summary-stat"><div class="val" style="color:${rk.color}">${ts.toLocaleString()}</div><div class="lbl">合計 / ${mx.toLocaleString()}</div></div>
        <div class="summary-stat"><div class="val">${avg}</div><div class="lbl">平均スコア</div></div>
      </div>
    </div>
    <div class="summary-list">
      <div class="summary-list-header">全${state.results.length}問の結果</div>
      ${state.results.map(r=>{const k=getRank(r.score);return`<div class="summary-item"><div class="sc" style="background:${k.color}22;color:${k.color}">${r.score}</div><div class="info"><div class="nm">${r.site.name}</div><div class="det">${r.site.country} · ${Math.round(r.dist).toLocaleString()}km · ${r.site.era}</div></div></div>`}).join('')}
    </div>
    <button class="retry-btn" id="retryBtn">もう一度プレイ</button>
    ${isPrivateMode?'<p style="text-align:center;margin-top:12px;font-size:12px;color:var(--red)">⚠️ プライベートモード — 閉じる前にエクスポートを</p>':''}
    <div style="text-align:center;margin-top:12px"><button class="data-btn" id="summaryExport">📤 学習データを保存</button></div>
    <div style="height:40px"></div>
  </div>`;
  document.getElementById('retryBtn').onclick=()=>setState({mode:'start'});
  document.getElementById('summaryExport').onclick=exportSRData;
}

(async()=>{await detectStorage();render()})();

</script>
<script>if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js')</script>
</body>
</html>
